<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Should I Hire? · Trinh Sonsino HR Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:#fff;}.back-link{font-size:13px;color:#555;text-decoration:none;padding:16px 24px;display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid #e4e4e4;width:100%;}.back-link:hover{color:#0f0f0f;}</style>
</head>
<body>
<a href="../index.html" class="back-link">← Back to Trinh Sonsino</a>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const INK="#0f0f0f",MUTED="#555",FAINT="#9a9a9a",RULE="#e4e4e4";
const iStyle={width:"100%",boxSizing:"border-box",border:"1px solid #e4e4e4",borderRadius:6,padding:"11px 14px",fontSize:14,fontFamily:"inherit",color:"#0f0f0f",outline:"none",background:"#fff"};
const lStyle={fontSize:12,fontWeight:500,color:MUTED,display:"block",marginBottom:6};
const verdictColors={fte:{bg:"#f0fdf4",border:"#bbf7d0",color:"#166534"},contractor:{bg:"#eff6ff",border:"#bfdbfe",color:"#1d4ed8"},fixed_term:{bg:"#eff6ff",border:"#bfdbfe",color:"#1d4ed8"},absorb:{bg:"#fffbeb",border:"#fde68a",color:"#a16207"},fix_process:{bg:"#fffbeb",border:"#fde68a",color:"#a16207"},need_more_info:{bg:"#fafafa",border:"#e4e4e4",color:"#555"}};
const WORK_SHAPES=[{id:"ongoing",label:"Ongoing function",sub:"This work will exist indefinitely"},{id:"project",label:"Project with an end",sub:"Clear deliverable, then it's done"},{id:"surge",label:"Temporary surge",sub:"Spike in existing work, will normalize"},{id:"unsure",label:"Honestly not sure",sub:"It just feels like too much"}];
const HOURS=[{id:"full",label:"40+ hrs/week, sustained"},{id:"most",label:"25–40 hrs/week"},{id:"partial",label:"10–25 hrs/week"},{id:"scattered",label:"Hard to say — it's scattered"}];

// Guided intake prompts for managers who don't know what they need yet
const INTAKE_PROMPTS=[
{id:"team",label:"Your team today",question:"Describe what your team does and who's on it right now.",placeholder:"e.g., 4 engineers building our payments infrastructure. 2 senior, 2 mid-level. We own everything from checkout to reconciliation.",why:"Before knowing if you need to hire, you need a clear picture of what you have."},
{id:"pain",label:"The actual pain",question:"What's breaking, slipping, or not getting done? Be specific — not 'we're busy' but what's actually falling through the cracks.",placeholder:"e.g., We have 3 projects queued that we haven't started. The mobile checkout redesign has slipped 2 quarters. My team is working nights and it's not sustainable.",why:"Vague pain leads to vague solutions. Naming the specific problem often reveals whether it's a people problem or something else."},
{id:"business",label:"What the business needs",question:"What does your team need to deliver in the next 6 months, and what's currently standing in the way?",placeholder:"e.g., We need to ship the new API by Q3 for a key enterprise customer. Right now we don't have anyone with the infrastructure experience to lead it.",why:"Hiring should follow business need, not just workload. This connects the gap to an outcome."},
{id:"tried",label:"What you've already tried",question:"Have you tried redistributing work, changing priorities, or addressing process issues? What happened?",placeholder:"e.g., We deprioritized 2 projects last quarter but the remaining ones still aren't getting done. We also tried using a contractor but the ramp-up cost us more time than it saved.",why:"If the problem persists after redistribution and process fixes, it's more likely a genuine capacity gap."},
];

function Block({label,content}){return <div style={{marginBottom:28}}><div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>{label}</div><p style={{fontSize:14,color:MUTED,lineHeight:1.75,margin:0}}>{content}</p></div>;}

function App(){
const [mode,setMode]=useState(null); // null | "know" | "unsure"

// Know mode state
const [role,setRole]=useState("");const [why,setWhy]=useState("");const [workShape,setWorkShape]=useState("");const [hours,setHours]=useState("");const [absorption,setAbsorption]=useState("");const [teamLocation,setTeamLocation]=useState("");const [hireLocation,setHireLocation]=useState("");const [budget,setBudget]=useState("");const [noHire,setNoHire]=useState("");
const [verdict,setVerdict]=useState(null);

// Unsure mode state
const [activePrompt,setActivePrompt]=useState(0);
const [answers,setAnswers]=useState({team:"",pain:"",business:"",tried:""});
const [intakeOutput,setIntakeOutput]=useState(null);

const [loading,setLoading]=useState(false);const [error,setError]=useState(null);
const knowReady=role.trim()&&why.trim()&&workShape&&hours;
const allAnswered=INTAKE_PROMPTS.every(p=>answers[p.id].trim().length>20);

async function callClaude(prompt,max=2000){
const r=await fetch("https://tsonsino-backend.vercel.app/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:prompt,maxTokens:max})});
const d=await r.json();return d.text;}

async function analyzeKnow(){
if(!knowReady)return;setLoading(true);setError(null);setVerdict(null);
try{
const shapeLabel=WORK_SHAPES.find(w=>w.id===workShape)?.label||workShape;
const hoursLabel=HOURS.find(h=>h.id===hours)?.label||hours;
const text=await callClaude(`You are a seasoned HRBP and finance-minded advisor at a lean startup. A manager wants to hire. Challenge the request rigorously but fairly.\n\nRole: ${role}\nWhy: ${why}\nWork shape: ${shapeLabel}\nVolume: ${hoursLabel}\nTeam absorption: ${absorption||"not answered"}\nTeam location: ${teamLocation||"not specified"}\nHire location: ${hireLocation||"not specified"}\nBudget: ${budget||"not specified"}\nIf don't hire: ${noHire||"not answered"}\n\nReturn ONLY valid JSON:\n{"verdict":"fte|contractor|fixed_term|absorb|fix_process|need_more_info","verdict_label":"human label","confidence":"high|moderate|low","reasoning":"3-5 sentences referencing their answers","location_analysis":"2-4 sentences on cost/collaboration/compliance","cost_picture":"2-3 sentences on true cost vs FTE default (1.25-1.4x salary + equity + overhead)","challenge_questions":["2-4 questions finance will ask"],"if_recommended_path":"3-4 sentences: if FTE justification for finance; if other, concrete alternative plan","revisit_trigger":"one sentence on specific signal to revisit"}\n\nBe honest not contrarian. Weight vague answers as signals. FTE true cost = 1.25-1.4x salary + equity + overhead.`);
setVerdict(JSON.parse(text.replace(/```json|```/g,"").trim()));}
catch(e){setError("Something went wrong. Try again.");}
setLoading(false);}

async function analyzeIntake(){
if(!allAnswered)return;setLoading(true);setError(null);setIntakeOutput(null);
try{
const answersText=INTAKE_PROMPTS.map(p=>`${p.label}:\n${answers[p.id]}`).join("\n\n");
const text=await callClaude(`You are an experienced HRBP coaching a new manager who isn't sure what they need. Based on their answers, diagnose what's actually going on and tell them clearly what to do next.\n\nManager's answers:\n${answersText}\n\nReturn ONLY valid JSON:\n{"diagnosis":"3-4 sentences: what's actually going on based on what they described — is this a genuine capacity gap, a process problem, a prioritization problem, or unclear yet?","is_hiring_answer":true|false,"hiring_confidence":"high|moderate|low","what_to_do":"3-4 sentences of specific, ordered guidance on what to do next — if hire, what role and when; if not, what to try first","if_hiring":{"role_suggestion":"what type of role would actually solve the problem they described","timing":"when they should hire based on the business need they described","what_not_to_hire":"one sentence on a common mistake — hiring the wrong role to solve this problem"},"if_not_hiring":{"try_first":"2-3 specific things to try before hiring","revisit_when":"the specific signal that would confirm they do need to hire"},"for_leadership":"2-3 sentences the manager can use to explain their team's situation and needs to leadership — clear, business-focused, not a complaint"}\n\nBe direct and honest. If the problem sounds like burnout or poor prioritization, say so. If it genuinely sounds like a capacity gap, say that too.`,2000);
setIntakeOutput(JSON.parse(text.replace(/```json|```/g,"").trim()));}
catch(e){setError("Something went wrong. Try again.");}
setLoading(false);}

return <div style={{fontFamily:"Inter,system-ui,sans-serif",background:"#fff",minHeight:"100vh",color:INK}}>
<div style={{maxWidth:780,margin:"0 auto",padding:"40px 24px 80px"}}>

<div style={{borderBottom:`1px solid ${RULE}`,paddingBottom:20,marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>HR Toolkit · 05</div>
<h1 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:34,lineHeight:1.15,margin:0}}>Should I Hire?</h1>
<p style={{color:MUTED,fontSize:15,maxWidth:560,lineHeight:1.65,marginTop:12,marginBottom:0}}>Two modes: if you know what role you want, pressure-test whether it's the right call. If you're not sure what you need yet, start here for a guided diagnostic.</p>
</div>

{!mode&&<div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
<button onClick={()=>setMode("know")} style={{textAlign:"left",padding:"24px 26px",border:`1px solid ${RULE}`,borderRadius:8,background:"#fff",cursor:"pointer"}}>
<div style={{fontWeight:600,fontSize:16,marginBottom:8}}>I know what I want to hire</div>
<div style={{fontSize:13,color:MUTED,lineHeight:1.6}}>You have a role in mind. Let's pressure-test whether it's the right call — FTE, contractor, absorb, or something else.</div>
<div style={{fontSize:12,color:"#2563eb",marginTop:12,fontWeight:500}}>Challenge the req →</div>
</button>
<button onClick={()=>setMode("unsure")} style={{textAlign:"left",padding:"24px 26px",border:`1px solid ${RULE}`,borderRadius:8,background:"#fff",cursor:"pointer"}}>
<div style={{fontWeight:600,fontSize:16,marginBottom:8}}>I'm not sure what I need</div>
<div style={{fontSize:13,color:MUTED,lineHeight:1.6}}>Your team is struggling but you're not sure if hiring is the answer. Start here for a guided diagnostic of what's actually going on.</div>
<div style={{fontSize:12,color:"#2563eb",marginTop:12,fontWeight:500}}>Start the diagnostic →</div>
</button>
</div>
</div>}

{/* ── KNOW MODE ── */}
{mode==="know"&&<div>
<button onClick={()=>{setMode(null);setVerdict(null);}} style={{border:"none",background:"none",color:FAINT,fontSize:13,cursor:"pointer",textDecoration:"underline",marginBottom:24}}>← Back</button>
<label style={lStyle}>What role do you want to hire?</label>
<input value={role} onChange={e=>setRole(e.target.value)} placeholder="e.g., Senior Product Designer" style={{...iStyle,marginBottom:16}}/>
<label style={lStyle}>Why do you need this person? Be specific about the work.</label>
<textarea value={why} onChange={e=>setWhy(e.target.value)} placeholder="e.g., Design requests from 3 product teams are bottlenecked on our one designer. Two launches slipped last quarter waiting on design." rows={3} style={{...iStyle,resize:"vertical",marginBottom:20}}/>
<label style={lStyle}>What's the shape of the work?</label>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>{WORK_SHAPES.map(w=><button key={w.id} onClick={()=>setWorkShape(w.id)} style={{textAlign:"left",padding:"12px 16px",border:workShape===w.id?`2px solid ${INK}`:`1px solid ${RULE}`,borderRadius:8,background:"#fff",cursor:"pointer"}}><div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{w.label}</div><div style={{fontSize:12,color:FAINT}}>{w.sub}</div></button>)}</div>
<label style={lStyle}>How much work is it, really?</label>
<div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>{HOURS.map(h=><button key={h.id} onClick={()=>setHours(h.id)} style={{padding:"10px 16px",fontSize:13,fontWeight:500,border:hours===h.id?`2px solid ${INK}`:`1px solid ${RULE}`,borderRadius:20,background:"#fff",cursor:"pointer",color:INK}}>{h.label}</button>)}</div>
<label style={lStyle}>Could anyone on the existing team absorb it? <span style={{color:FAINT,fontWeight:400}}>(be honest)</span></label>
<textarea value={absorption} onChange={e=>setAbsorption(e.target.value)} placeholder="e.g., Maybe — our mid-level designer has asked for more scope, but she's at capacity until March." rows={2} style={{...iStyle,resize:"vertical",marginBottom:20}}/>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
<div><label style={lStyle}>Where does the current team sit?</label><input value={teamLocation} onChange={e=>setTeamLocation(e.target.value)} placeholder="e.g., SF hub + 3 remote in PT/MT" style={iStyle}/></div>
<div><label style={lStyle}>Where would this hire be?</label><input value={hireLocation} onChange={e=>setHireLocation(e.target.value)} placeholder="e.g., Open to remote US, or NYC" style={iStyle}/></div>
</div>
<div style={{marginBottom:20}}><label style={lStyle}>Budget context <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label><input value={budget} onChange={e=>setBudget(e.target.value)} placeholder="e.g., ~$160K budgeted" style={iStyle}/></div>
<label style={lStyle}>What actually happens if you don't hire?</label>
<textarea value={noHire} onChange={e=>setNoHire(e.target.value)} placeholder="The most revealing question. What breaks, what slips, what's the real cost of waiting?" rows={2} style={{...iStyle,resize:"vertical",marginBottom:24}}/>
<button onClick={analyzeKnow} disabled={loading||!knowReady} style={{background:INK,color:"#fff",border:"none",padding:"13px 28px",fontSize:14,fontWeight:500,borderRadius:4,cursor:loading?"wait":"pointer",opacity:loading||!knowReady?0.6:1}}>{loading?"Pressure-testing the request…":"Challenge this headcount"}</button>
{error&&<div style={{color:"#b91c1c",fontSize:13,marginTop:10}}>{error}</div>}

{verdict&&<div style={{marginTop:24}}>
{(()=>{const vc=verdictColors[verdict.verdict]||verdictColors.need_more_info;return <div style={{background:vc.bg,border:`1px solid ${vc.border}`,borderRadius:10,padding:"22px 26px",marginBottom:28}}><div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:vc.color,marginBottom:6}}>Recommendation · {verdict.confidence} confidence</div><div style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:26,color:vc.color,marginBottom:10}}>{verdict.verdict_label}</div><div style={{fontSize:14,color:INK,lineHeight:1.7}}>{verdict.reasoning}</div></div>;})()}
<Block label="Location check" content={verdict.location_analysis}/>
<Block label="The cost picture" content={verdict.cost_picture}/>
{verdict.challenge_questions?.length>0&&<div style={{marginBottom:28}}><div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>Before this goes to finance</div><div style={{display:"grid",gap:8}}>{verdict.challenge_questions.map((q,i)=><div key={i} style={{background:"#fafafa",border:`1px solid ${RULE}`,borderRadius:6,padding:"12px 16px",fontSize:14,color:MUTED,lineHeight:1.6}}>{q}</div>)}</div></div>}
<Block label="The path forward" content={verdict.if_recommended_path}/>
<Block label="When to revisit" content={verdict.revisit_trigger}/>
</div>}
</div>}

{/* ── UNSURE MODE ── */}
{mode==="unsure"&&<div>
{!intakeOutput&&<div>
<button onClick={()=>{setMode(null);setIntakeOutput(null);setAnswers({team:"",pain:"",business:"",tried:""});setActivePrompt(0);}} style={{border:"none",background:"none",color:FAINT,fontSize:13,cursor:"pointer",textDecoration:"underline",marginBottom:24}}>← Back</button>
<div style={{display:"flex",gap:6,marginBottom:32}}>
{INTAKE_PROMPTS.map((p,i)=><div key={p.id} onClick={()=>setActivePrompt(i)} style={{flex:1,height:4,borderRadius:2,cursor:"pointer",background:answers[p.id].trim().length>20?INK:i===activePrompt?"#888":RULE}}/>)}
</div>
{INTAKE_PROMPTS.map((p,i)=>i===activePrompt&&<div key={p.id}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:8}}>{i+1} of {INTAKE_PROMPTS.length} · {p.label}</div>
<p style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:20,lineHeight:1.45,color:INK,marginBottom:10,maxWidth:580}}>{p.question}</p>
<p style={{fontSize:12,color:FAINT,lineHeight:1.55,marginBottom:18}}>{p.why}</p>
<textarea value={answers[p.id]} onChange={e=>setAnswers(a=>({...a,[p.id]:e.target.value}))} placeholder={p.placeholder} rows={5} style={{...iStyle,resize:"vertical",marginBottom:20}} autoFocus/>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
<div/>
<div style={{display:"flex",gap:10}}>
{i>0&&<button onClick={()=>setActivePrompt(i-1)} style={{border:"1px solid #ccc",background:"#fff",color:INK,padding:"11px 20px",fontSize:13,fontWeight:500,borderRadius:4,cursor:"pointer"}}>← Previous</button>}
{i<INTAKE_PROMPTS.length-1?<button onClick={()=>setActivePrompt(i+1)} disabled={!answers[p.id].trim()} style={{background:INK,color:"#fff",border:"none",padding:"11px 24px",fontSize:13,fontWeight:500,borderRadius:4,cursor:answers[p.id].trim()?"pointer":"not-allowed",opacity:answers[p.id].trim()?1:0.5}}>Next →</button>
:<button onClick={analyzeIntake} disabled={loading||!allAnswered} style={{background:INK,color:"#fff",border:"none",padding:"11px 24px",fontSize:13,fontWeight:500,borderRadius:4,cursor:loading?"wait":"pointer",opacity:loading||!allAnswered?0.6:1}}>{loading?"Diagnosing…":"Get my diagnosis →"}</button>}
</div>
</div>
{error&&<div style={{color:"#b91c1c",fontSize:13,marginTop:12}}>{error}</div>}
<div style={{marginTop:32,borderTop:`1px solid ${RULE}`,paddingTop:20}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:FAINT,marginBottom:12}}>Your answers so far</div>
{INTAKE_PROMPTS.map((pr,idx)=><div key={pr.id} onClick={()=>setActivePrompt(idx)} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"10px 14px",borderRadius:6,cursor:"pointer",background:idx===activePrompt?"#fafafa":"transparent",border:idx===activePrompt?`1px solid ${RULE}`:"1px solid transparent",marginBottom:6}}>
<span style={{width:20,height:20,borderRadius:"50%",flexShrink:0,marginTop:2,background:answers[pr.id].trim().length>20?INK:RULE,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:600}}>{answers[pr.id].trim().length>20?"✓":idx+1}</span>
<div><div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{pr.label}</div>{answers[pr.id].trim()?<div style={{fontSize:12,color:FAINT,lineHeight:1.5}}>{answers[pr.id].substring(0,80)}{answers[pr.id].length>80?"…":""}</div>:<div style={{fontSize:12,color:RULE}}>Not answered yet</div>}</div>
</div>)}
</div>
</div>)}
</div>}

{intakeOutput&&<div>
<button onClick={()=>{setIntakeOutput(null);setAnswers({team:"",pain:"",business:"",tried:""});setActivePrompt(0);}} style={{border:"none",background:"none",color:FAINT,fontSize:13,cursor:"pointer",textDecoration:"underline",marginBottom:24}}>← Start over</button>
{(()=>{const isHire=intakeOutput.is_hiring_answer;const vc=isHire?{bg:"#f0fdf4",border:"#bbf7d0",color:"#166534"}:{bg:"#fffbeb",border:"#fde68a",color:"#a16207"};return <div style={{background:vc.bg,border:`1px solid ${vc.border}`,borderRadius:10,padding:"20px 24px",marginBottom:24}}><div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:vc.color,marginBottom:6}}>Diagnosis · {intakeOutput.hiring_confidence} confidence</div><div style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:24,color:vc.color,marginBottom:8}}>{isHire?"Yes — this looks like a hiring need":"Not yet — try these first"}</div><div style={{fontSize:14,color:INK,lineHeight:1.7}}>{intakeOutput.diagnosis}</div></div>;})()}
<Block label="What to do next" content={intakeOutput.what_to_do}/>
{intakeOutput.is_hiring_answer&&intakeOutput.if_hiring&&<div style={{marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>If you hire</div>
<div style={{border:`1px solid ${RULE}`,borderRadius:8,padding:"16px 18px"}}>
<div style={{marginBottom:10}}><span style={{fontWeight:600,fontSize:13}}>Role to consider:</span> <span style={{fontSize:14,color:MUTED}}>{intakeOutput.if_hiring.role_suggestion}</span></div>
<div style={{marginBottom:10}}><span style={{fontWeight:600,fontSize:13}}>Timing:</span> <span style={{fontSize:14,color:MUTED}}>{intakeOutput.if_hiring.timing}</span></div>
<div style={{fontSize:13,color:"#a16207",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:6,padding:"8px 12px"}}><strong>Don't:</strong> {intakeOutput.if_hiring.what_not_to_hire}</div>
</div>
</div>}
{!intakeOutput.is_hiring_answer&&intakeOutput.if_not_hiring&&<div style={{marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>Try these first</div>
<div style={{border:`1px solid ${RULE}`,borderRadius:8,padding:"16px 18px"}}>
<p style={{fontSize:14,color:MUTED,lineHeight:1.7,marginBottom:10}}>{intakeOutput.if_not_hiring.try_first}</p>
<p style={{fontSize:13,color:"#1d4ed8",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"8px 12px",margin:0}}><strong>Revisit hiring when:</strong> {intakeOutput.if_not_hiring.revisit_when}</p>
</div>
</div>}
<div style={{background:"#fafafa",border:`1px solid ${RULE}`,borderRadius:8,padding:"16px 18px"}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:8}}>How to explain this to leadership</div>
<p style={{fontSize:14,color:MUTED,lineHeight:1.7,margin:0,fontStyle:"italic"}}>"{intakeOutput.for_leadership}"</p>
</div>
</div>}
</div>}

<div style={{marginTop:60,paddingTop:20,borderTop:`1px solid ${RULE}`,fontSize:12,color:FAINT,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
<span>Should I Hire? · HR Toolkit for lean, scaling teams</span>
<a href="../index.html" style={{color:FAINT,textDecoration:"none"}}>Built by Trinh Sonsino</a>
</div>
</div></div>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
