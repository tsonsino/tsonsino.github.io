<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calibration Prep · Trinh Sonsino HR Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:#fff;}.back-link{font-size:13px;color:#555;text-decoration:none;padding:16px 24px;display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid #e4e4e4;width:100%;}.back-link:hover{color:#0f0f0f;}</style>
</head>
<body>
<a href="../index.html" class="back-link">← Back to Trinh Sonsino</a>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const INK="#0f0f0f",MUTED="#555",FAINT="#9a9a9a",RULE="#e4e4e4";
const iStyle={width:"100%",boxSizing:"border-box",border:"1px solid #e4e4e4",borderRadius:6,padding:"11px 14px",fontSize:14,fontFamily:"inherit",color:"#0f0f0f",outline:"none",background:"#fff"};
const lStyle={fontSize:12,fontWeight:500,color:MUTED,display:"block",marginBottom:6};
const flagLabels={inflation:{label:"Possible inflation",color:"#b91c1c",bg:"#fef2f2"},vague_evidence:{label:"Vague evidence",color:"#a16207",bg:"#fffbeb"},recency:{label:"Recency effect",color:"#a16207",bg:"#fffbeb"},personality_based:{label:"Personality-based",color:"#a16207",bg:"#fffbeb"},mismatch:{label:"Rating mismatch",color:"#b91c1c",bg:"#fef2f2"},halo:{label:"Halo effect",color:"#a16207",bg:"#fffbeb"}};

function SH({label,title}){return <div style={{borderBottom:"1px solid #e4e4e4",paddingBottom:10,marginBottom:16,display:"flex",alignItems:"baseline",gap:12}}><span style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT}}>{label}</span><span style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:19}}>{title}</span></div>;}

function App(){
const [scaleInput,setScaleInput]=useState("Exceeds, Meets, Below");
const [cycleContext,setCycleContext]=useState("");
const [people,setPeople]=useState([{id:1,name:"",role:"",rating:"",justification:""}]);
const [analysis,setAnalysis]=useState(null);
const [loading,setLoading]=useState(false);
const [error,setError]=useState(null);
const scale=scaleInput.split(",").map(s=>s.trim()).filter(Boolean);
const filled=people.filter(p=>p.rating&&p.justification.trim());

function updateP(id,field,val){setPeople(ps=>ps.map(p=>p.id===id?{...p,[field]:val}:p));}

async function analyze(){
if(filled.length<2)return;setLoading(true);setError(null);setAnalysis(null);
try{
const roster=filled.map((p,i)=>`Person ${i+1}: ${p.name||"Unnamed"} (${p.role||"?"}) — Rating: ${p.rating}\nJustification: ${p.justification}`).join("\n\n");
const r=await fetch("https://tsonsino-backend.vercel.app/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({maxTokens:2500,prompt:`You are an experienced HR leader running performance calibration. Analyze this batch.\n\nRating scale (highest to lowest): ${scale.join(" > ")}\nCycle context: ${cycleContext||"not specified"}\n\nProposed ratings:\n${roster}\n\nReturn ONLY valid JSON:\n{"distribution":{"summary":"2-3 sentences on distribution shape","counts":[{"rating":"name","count":number}]},"flags":[{"person":"name or Person N","type":"inflation|vague_evidence|recency|personality_based|mismatch|halo","note":"1-2 sentences on the pattern"}],"strong_examples":["names of well-evidenced justifications"],"discussion_questions":[{"person":"name","question":"one sharp question for the calibration room"}],"overall":"3-4 sentences coaching for the person running calibration"}\n\nOnly flag real patterns. Surface strong work too. Never speculate about demographics.`}))});
const d=await r.json();const text=d.text;
setAnalysis(JSON.parse(text.replace(/```json|```/g,"").trim()));}
catch(e){setError("Something went wrong. Try again.");}
setLoading(false);}

return <div style={{fontFamily:"Inter,system-ui,sans-serif",background:"#fff",minHeight:"100vh",color:INK}}>
<div style={{maxWidth:820,margin:"0 auto",padding:"40px 24px 80px"}}>
<div style={{borderBottom:`1px solid ${RULE}`,paddingBottom:20,marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>HR Toolkit · 03</div>
<h1 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:34,lineHeight:1.15,margin:0}}>Calibration Prep</h1>
<p style={{color:MUTED,fontSize:15,maxWidth:580,lineHeight:1.65,marginTop:12,marginBottom:0}}>Paste proposed ratings and justifications before your calibration session. Get the distribution picture, pattern flags, and the questions worth asking in the room.</p>
</div>
<div style={{background:"#fafafa",border:`1px solid ${RULE}`,borderRadius:8,padding:"12px 16px",fontSize:13,color:MUTED,lineHeight:1.6,marginBottom:28}}><strong>Privacy tip:</strong> use initials or "Person A / B / C" instead of full names.</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
<div><label style={lStyle}>Rating scale (highest first)</label><input value={scaleInput} onChange={e=>setScaleInput(e.target.value)} style={iStyle}/></div>
<div><label style={lStyle}>Cycle context <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label><input value={cycleContext} onChange={e=>setCycleContext(e.target.value)} placeholder="e.g., Annual review, eng team" style={iStyle}/></div>
</div>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:14}}>Proposed ratings</div>
{people.map((p,idx)=><div key={p.id} style={{border:`1px solid ${RULE}`,borderRadius:8,padding:"18px 20px",marginBottom:14}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
<span style={{fontSize:12,fontWeight:600,color:FAINT}}>PERSON {idx+1}</span>
{people.length>1&&<button onClick={()=>setPeople(ps=>ps.filter(x=>x.id!==p.id))} style={{border:"none",background:"none",color:FAINT,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>Remove</button>}
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
<input value={p.name} onChange={e=>updateP(p.id,"name",e.target.value)} placeholder="Initials / Person A" style={iStyle}/>
<input value={p.role} onChange={e=>updateP(p.id,"role",e.target.value)} placeholder="Role" style={iStyle}/>
<select value={p.rating} onChange={e=>updateP(p.id,"rating",e.target.value)} style={{...iStyle,height:42}}><option value="">Proposed rating…</option>{scale.map(s=><option key={s}>{s}</option>)}</select>
</div>
<textarea value={p.justification} onChange={e=>updateP(p.id,"justification",e.target.value)} placeholder="Paste the manager's justification…" rows={3} style={{...iStyle,resize:"vertical"}}/>
</div>)}
<div style={{display:"flex",gap:12,marginBottom:36,flexWrap:"wrap"}}>
<button onClick={()=>setPeople(ps=>[...ps,{id:Date.now(),name:"",role:"",rating:"",justification:""}])} style={{border:"1px solid #ccc",background:"#fff",color:INK,padding:"10px 18px",fontSize:13,fontWeight:500,borderRadius:4,cursor:"pointer"}}>+ Add person</button>
<button onClick={analyze} disabled={loading||filled.length<2} style={{background:INK,color:"#fff",border:"none",padding:"11px 26px",fontSize:14,fontWeight:500,borderRadius:4,cursor:loading?"wait":"pointer",opacity:loading||filled.length<2?0.6:1}}>{loading?"Analyzing…":`Analyze${filled.length>=2?` (${filled.length} people)`:""}`}</button>
</div>
{error&&<div style={{color:"#b91c1c",fontSize:13,marginBottom:20}}>{error}</div>}

{analysis&&<div>
<SH label="Distribution" title="The shape of the batch"/>
<div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>{analysis.distribution.counts.map(c=><div key={c.rating} style={{border:`1px solid ${RULE}`,borderRadius:8,padding:"12px 20px",textAlign:"center",minWidth:90}}><div style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:26,lineHeight:1}}>{c.count}</div><div style={{fontSize:12,color:FAINT,marginTop:4}}>{c.rating}</div></div>)}</div>
<p style={{fontSize:14,color:MUTED,lineHeight:1.7,marginBottom:32}}>{analysis.distribution.summary}</p>

{analysis.flags?.length>0&&<><SH label="Patterns" title="Worth a closer look"/>
<div style={{display:"grid",gap:10,marginBottom:32}}>{analysis.flags.map((f,i)=>{const fl=flagLabels[f.type]||{label:f.type,color:MUTED,bg:"#fafafa"};return <div key={i} style={{border:`1px solid ${RULE}`,borderRadius:8,padding:"14px 18px"}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}><span style={{fontWeight:600,fontSize:14}}>{f.person}</span><span style={{background:fl.bg,color:fl.color,fontSize:10,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",padding:"3px 8px",borderRadius:20}}>{fl.label}</span></div><div style={{fontSize:13,color:MUTED,lineHeight:1.65}}>{f.note}</div></div>;})}</div></>}

{analysis.strong_examples?.length>0&&<><SH label="The bar" title="Well-evidenced justifications"/><p style={{fontSize:14,color:MUTED,lineHeight:1.7,marginBottom:32}}>{analysis.strong_examples.join(", ")} — these justifications point to specific, sustained outcomes. Use them as the reference standard when discussing the others.</p></>}

{analysis.discussion_questions?.length>0&&<><SH label="For the room" title="Questions to ask in calibration"/>
<div style={{display:"grid",gap:8,marginBottom:32}}>{analysis.discussion_questions.map((q,i)=><div key={i} style={{background:"#fafafa",border:`1px solid ${RULE}`,borderRadius:6,padding:"12px 16px",fontSize:14,color:MUTED,lineHeight:1.6}}><span style={{fontWeight:600,color:INK}}>{q.person}:</span> {q.question}</div>)}</div></>}

<SH label="Bottom line" title="How to run this session"/>
<p style={{fontSize:14,color:MUTED,lineHeight:1.75,marginBottom:8}}>{analysis.overall}</p>
<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"12px 16px",fontSize:13,color:"#78350f",lineHeight:1.6,marginTop:20}}>This analysis reads the language of justifications — it can't see the actual work. Flags are conversation starters, not verdicts. Final ratings belong to humans.</div>
</div>}

<div style={{marginTop:60,paddingTop:20,borderTop:`1px solid ${RULE}`,fontSize:12,color:FAINT,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
<span>Calibration Prep · HR Toolkit for lean, scaling teams</span>
<a href="../index.html" style={{color:FAINT,textDecoration:"none"}}>Built by Trinh Sonsino</a>
</div>
</div></div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
