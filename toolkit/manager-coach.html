<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manager Coach - Trinh Sonsino HR Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#fff;color:#0f0f0f;}
.back-link{font-size:13px;color:#555;text-decoration:none;padding:16px 24px;display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid #e4e4e4;width:100%;}
.back-link:hover{color:#0f0f0f;}
.wrap{max-width:780px;margin:0 auto;padding:40px 24px 80px;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#9a9a9a;margin-bottom:10px;}
h1{font-family:'DM Serif Display',serif;font-size:34px;line-height:1.15;margin:0;}
.subtitle{color:#555;font-size:15px;max-width:540px;line-height:1.65;margin-top:12px;}
.divider{border:none;border-top:1px solid #e4e4e4;margin:24px 0;}
label{font-size:12px;font-weight:500;color:#555;display:block;margin-bottom:6px;}
input,textarea{width:100%;box-sizing:border-box;border:1px solid #e4e4e4;border-radius:6px;padding:11px 14px;font-size:14px;font-family:inherit;color:#0f0f0f;outline:none;background:#fff;}
.mb20{margin-bottom:20px;}
.mb28{margin-bottom:28px;}
.btn-primary{background:#0f0f0f;color:#fff;border:none;padding:13px 28px;font-size:14px;font-weight:500;border-radius:4px;cursor:pointer;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-secondary{border:1px solid #ccc;background:#fff;color:#555;padding:9px 16px;font-size:13px;font-weight:500;border-radius:4px;cursor:pointer;}
.guide-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;}
.guide-btn{text-align:left;padding:12px 16px;border:1px solid #e4e4e4;border-radius:8px;background:#fff;cursor:pointer;}
.guide-btn:hover{border-color:#0f0f0f;}
.guide-label{font-weight:600;font-size:13px;margin-bottom:2px;}
.guide-sub{font-size:12px;color:#9a9a9a;}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#9a9a9a;margin-bottom:8px;}
.escalate-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:20px 24px;margin-bottom:24px;}
.escalate-title{font-weight:600;font-size:14px;color:#b91c1c;margin-bottom:8px;}
.escalate-text{font-size:14px;color:#7f1d1d;line-height:1.7;}
.result-block{margin-bottom:24px;}
.phrase-card{background:#fafafa;border:1px solid #e4e4e4;border-radius:6px;padding:12px 16px;margin-bottom:8px;font-size:14px;color:#555;line-height:1.6;font-style:italic;}
.avoid-item{display:flex;gap:10px;margin-bottom:8px;font-size:14px;color:#555;line-height:1.65;}
.avoid-marker{color:#b91c1c;flex-shrink:0;}
.step-item{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;font-size:14px;color:#555;line-height:1.65;}
.step-num{width:24px;height:24px;border-radius:50%;background:#0f0f0f;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px;}
.watch-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px 18px;font-size:14px;color:#78350f;line-height:1.7;}
.guide-output{background:#fafafa;border:1px solid #e4e4e4;border-radius:8px;padding:24px 28px;font-size:14px;color:#555;line-height:1.8;white-space:pre-wrap;}
.error{color:#b91c1c;font-size:13px;margin-top:10px;}
.footer{margin-top:60px;padding-top:20px;border-top:1px solid #e4e4e4;display:flex;justify-content:space-between;font-size:12px;color:#9a9a9a;}
</style>
</head>
<body>
<a href="../index.html" class="back-link">&larr; Back to Trinh Sonsino</a>
<div class="wrap">
  <div class="eyebrow">HR Toolkit &middot; 02</div>
  <h1>Manager Coach</h1>
  <p class="subtitle">Two modes: describe a real situation and get coaching on what to do, or browse common management scenarios for a quick practical guide.</p>
  <hr class="divider"/>

  <!-- Mode selector -->
  <div id="mode-section">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <button onclick="showSituation()" style="text-align:left;padding:24px 26px;border:1px solid #e4e4e4;border-radius:8px;background:#fff;cursor:pointer;">
        <div style="font-weight:600;font-size:16px;margin-bottom:8px;">I have a specific situation</div>
        <div style="font-size:13px;color:#555;line-height:1.6;">Describe what is happening and get tailored coaching on what to say and do.</div>
        <div style="font-size:12px;color:#2563eb;margin-top:12px;font-weight:500;">Get coaching &rarr;</div>
      </button>
      <button onclick="showGuides()" style="text-align:left;padding:24px 26px;border:1px solid #e4e4e4;border-radius:8px;background:#fff;cursor:pointer;">
        <div style="font-weight:600;font-size:16px;margin-bottom:8px;">I want a quick guide</div>
        <div style="font-size:13px;color:#555;line-height:1.6;">Browse common management scenarios - feedback, performance, conflict, and more.</div>
        <div style="font-size:12px;color:#2563eb;margin-top:12px;font-weight:500;">Browse guides &rarr;</div>
      </button>
    </div>
  </div>

  <!-- Situation mode -->
  <div id="situation-section" style="display:none;">
    <button onclick="showMode()" style="border:none;background:none;color:#9a9a9a;font-size:13px;cursor:pointer;text-decoration:underline;margin-bottom:24px;">&larr; Back</button>
    <div class="mb20">
      <label>What is happening? Be specific.</label>
      <textarea id="situation" rows="4" placeholder="e.g., One of my direct reports keeps missing deadlines. She is generally good at her job but this has happened 3 times in the last month. I am not sure if it is a personal issue or something else."></textarea>
    </div>
    <div class="mb28">
      <label>Any context that matters? (optional)</label>
      <textarea id="context" rows="2" placeholder="e.g., She just got back from parental leave. Her peers have not noticed yet."></textarea>
    </div>
    <button class="btn-primary" id="coach-btn" onclick="getCoaching()">Get coaching</button>
    <div id="coach-error" class="error"></div>
    <div id="coaching-output" style="display:none;margin-top:32px;"></div>
  </div>

  <!-- Guides mode -->
  <div id="guides-section" style="display:none;">
    <button onclick="showMode()" style="border:none;background:none;color:#9a9a9a;font-size:13px;cursor:pointer;text-decoration:underline;margin-bottom:24px;">&larr; Back</button>
    <div class="section-label" style="margin-bottom:14px;">Common scenarios</div>
    <div class="guide-grid" id="guide-grid"></div>
    <div id="guide-error" class="error"></div>
    <div id="guide-output" style="display:none;margin-top:32px;"></div>
  </div>

  <div class="footer">
    <span>Manager Coach &middot; HR Toolkit for lean, scaling teams</span>
    <span>Built by Trinh Sonsino</span>
  </div>
</div>

<script>
var guides = [
  {id:'feedback', label:'Giving difficult feedback', sub:'When the conversation is overdue'},
  {id:'underperform', label:'Addressing underperformance', sub:'Before it becomes a formal process'},
  {id:'conflict', label:'Team conflict', sub:'Two people who are not working well together'},
  {id:'promotion', label:'Declining a promotion request', sub:'When someone asks and the answer is not yet'},
  {id:'1on1', label:'Running effective 1:1s', sub:'Making them worth the time'},
  {id:'pip', label:'Starting a PIP conversation', sub:'How to open it without destroying trust'},
  {id:'burnout', label:'Signs of burnout', sub:'What to watch for and how to respond'},
  {id:'departure', label:'Handling a surprise resignation', sub:'What to do in the first 24 hours'}
];

document.getElementById('guide-grid').innerHTML = guides.map(function(g) {
  return '<button class="guide-btn" onclick="getGuide(\''+g.id+'\',\''+g.label+'\')">' +
    '<div class="guide-label">'+g.label+'</div>' +
    '<div class="guide-sub">'+g.sub+'</div>' +
    '</button>';
}).join('');

function showMode() {
  document.getElementById('mode-section').style.display = 'block';
  document.getElementById('situation-section').style.display = 'none';
  document.getElementById('guides-section').style.display = 'none';
}

function showSituation() {
  document.getElementById('mode-section').style.display = 'none';
  document.getElementById('situation-section').style.display = 'block';
}

function showGuides() {
  document.getElementById('mode-section').style.display = 'none';
  document.getElementById('guides-section').style.display = 'block';
}

async function callAPI(prompt, maxTokens) {
  var response = await fetch('https://tsonsino-backend.vercel.app/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({prompt: prompt, maxTokens: maxTokens || 2000})
  });
  var data = await response.json();
  if (!data.text) throw new Error(data.error || 'No response'); if (data.error && data.error.includes('high demand')) throw new Error(data.error);
  return data.text;
}

function repairJSON(text) {
  var cleaned = text.replace(/```json|```/g, '').trim();
  try { JSON.parse(cleaned); return cleaned; } catch(e) {}
  // Try to repair truncated JSON
  var opens = 0, openArr = 0;
  for (var i = 0; i < cleaned.length; i++) {
    if (cleaned[i] === '{') opens++;
    else if (cleaned[i] === '}') opens--;
    else if (cleaned[i] === '[') openArr++;
    else if (cleaned[i] === ']') openArr--;
  }
  if (cleaned.match(/"[^"]*$/)) cleaned += '"';
  while (openArr > 0) { cleaned += ']'; openArr--; }
  while (opens > 0) { cleaned += '}'; opens--; }
  return cleaned;
}

async function getCoaching() {
  var situation = document.getElementById('situation').value.trim();
  var context = document.getElementById('context').value.trim();
  if (!situation) return;

  var btn = document.getElementById('coach-btn');
  btn.disabled = true;
  btn.textContent = 'Coaching...';
  document.getElementById('coach-error').textContent = '';
  document.getElementById('coaching-output').style.display = 'none';

  var prompt = 'You are a management coach. A manager needs practical coaching on a real situation.\n\n' +
    'SITUATION: ' + situation + '\n' +
    'CONTEXT: ' + (context || 'none') + '\n\n' +
    'Screen for escalation: harassment, discrimination, medical/disability disclosures, threats, legal claims, protected leave, pay equity, protected class issues - these need HR first.\n\n' +
    'Return ONLY valid JSON. Keep ALL fields SHORT - 1-2 sentences max each:\n' +
    '{"escalate":true,"escalation_reason":"why HR first and what to do now OR null if no escalation",' +
    '"framing":"1-2 sentences reframing what is really going on",' +
    '"steps":["3-4 concrete ordered steps - one sentence each"],' +
    '"say":["2-3 example phrases - short"],' +
    '"avoid":["2-3 things NOT to say/do - one sentence each"],' +
    '"watch_for":"1 sentence on what to pay attention to"}\n\n' +
    'Be direct. No jargon. Total response under 600 tokens.';

  try {
    var text = await callAPI(prompt, 2000);
    var result = JSON.parse(repairJSON(text));
    renderCoaching(result);
    document.getElementById('coaching-output').style.display = 'block';
  } catch(e) {
    document.getElementById('coach-error').textContent = e.message && e.message.includes('high demand') ? 'Gemini is experiencing high demand right now. Wait a few seconds and try again.' : 'Something went wrong. Try again.';
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = 'Get coaching';
}

function renderCoaching(r) {
  var html = '';

  if (r.escalate) {
    html += '<div class="escalate-box">';
    html += '<div class="escalate-title">Involve HR first</div>';
    html += '<div class="escalate-text">' + (r.escalation_reason || '') + '</div>';
    html += '</div>';
  }

  if (r.framing) {
    html += '<div class="result-block"><div class="section-label">What is really going on</div>';
    html += '<p style="font-size:14px;color:#555;line-height:1.7;">' + r.framing + '</p></div>';
  }

  if (r.steps && r.steps.length) {
    html += '<div class="result-block"><div class="section-label">What to do</div>';
    r.steps.forEach(function(s, i) {
      html += '<div class="step-item"><div class="step-num">'+(i+1)+'</div><span>'+s+'</span></div>';
    });
    html += '</div>';
  }

  if (r.say && r.say.length) {
    html += '<div class="result-block"><div class="section-label">What to say</div>';
    r.say.forEach(function(s) {
      html += '<div class="phrase-card">"' + s + '"</div>';
    });
    html += '</div>';
  }

  if (r.avoid && r.avoid.length) {
    html += '<div class="result-block"><div class="section-label">What not to do</div>';
    r.avoid.forEach(function(a) {
      html += '<div class="avoid-item"><span class="avoid-marker">x</span><span>' + a + '</span></div>';
    });
    html += '</div>';
  }

  if (r.watch_for) {
    html += '<div class="watch-box"><strong>Watch for:</strong> ' + r.watch_for + '</div>';
  }

  html += '<div style="margin-top:24px;"><button class="btn-secondary" onclick="resetCoaching()">New situation</button></div>';
  document.getElementById('coaching-output').innerHTML = html;
}

function resetCoaching() {
  document.getElementById('situation').value = '';
  document.getElementById('context').value = '';
  document.getElementById('coaching-output').style.display = 'none';
}

async function getGuide(id, label) {
  document.getElementById('guide-error').textContent = '';
  document.getElementById('guide-output').style.display = 'none';
  document.getElementById('guide-output').innerHTML = '<div style="color:#9a9a9a;font-size:14px;padding:24px 0;">Writing the guide...</div>';
  document.getElementById('guide-output').style.display = 'block';
  document.getElementById('guide-output').scrollIntoView({behavior:'smooth'});

  var prompt = 'Write a practical one-page guide for a manager on: "' + label + '".\n\n' +
    'Audience: first-time or early-career manager at a startup. No jargon - what to actually do.\n\n' +
    'Write in plain text with CAPS section headings. Structure:\n' +
    '1. THE GOAL\n2. BEFORE\n3. THE CONVERSATION (with 2-3 example phrases)\n4. COMMON MISTAKES\n5. AFTER\n\n' +
    'Under 400 words. Immediately usable.';

  try {
    var text = await callAPI(prompt, 1200);
    document.getElementById('guide-output').innerHTML =
      '<div style="border-bottom:1px solid #e4e4e4;padding-bottom:12px;margin-bottom:20px;">' +
      '<div class="section-label">Guide</div>' +
      '<div style="font-family:DM Serif Display,serif;font-size:20px;">' + label + '</div></div>' +
      '<div class="guide-output">' + text + '</div>' +
      '<div style="margin-top:20px;"><button class="btn-secondary" onclick="document.getElementById(\'guide-output\').style.display=\'none\'">Close</button></div>';
  } catch(e) {
    document.getElementById('guide-error').textContent = e.message && e.message.includes('high demand') ? 'Gemini is experiencing high demand right now. Wait a few seconds and try again.' : 'Something went wrong. Try again.';
    document.getElementById('guide-output').style.display = 'none';
    console.error(e);
  }
}
</script>
</body>
</html>
