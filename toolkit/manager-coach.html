<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manager Coach · Trinh Sonsino HR Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:#fff;}.back-link{font-family:'Inter',sans-serif;font-size:13px;color:#555;text-decoration:none;padding:16px 24px;display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid #e4e4e4;width:100%;}.back-link:hover{color:#0f0f0f;}</style>
</head>
<body>
<a href="../index.html" class="back-link">← Back to Trinh Sonsino</a>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const INK="#0f0f0f",MUTED="#555",FAINT="#9a9a9a",RULE="#e4e4e4";
const QUICK_GUIDES=[{id:"first-11",label:"First 1:1 with a new report",emoji:"👋"},{id:"tough-feedback",label:"Delivering tough feedback",emoji:"💬"},{id:"performance",label:"Performance concerns",emoji:"📉"},{id:"comp",label:"Comp conversation",emoji:"💰"},{id:"conflict",label:"Conflict on my team",emoji:"⚡"},{id:"new-team",label:"Taking over an existing team",emoji:"🔄"}];
const iStyle={width:"100%",boxSizing:"border-box",border:"1px solid #e4e4e4",borderRadius:6,padding:"11px 14px",fontSize:14,fontFamily:"inherit",color:"#0f0f0f",outline:"none",background:"#fff"};

function Section({label,content}){if(!content)return null;return <div style={{marginBottom:24}}><div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:8}}>{label}</div><p style={{fontSize:14,color:MUTED,lineHeight:1.7,margin:0}}>{content}</p></div>;}
function SectionList({label,items,numbered,quoted}){if(!items?.length)return null;return <div style={{marginBottom:24}}><div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>{label}</div><div style={{display:"grid",gap:8}}>{items.map((item,i)=><div key={i} style={{fontSize:14,color:MUTED,lineHeight:1.65,padding:quoted?"10px 16px":"0",background:quoted?"#fafafa":"transparent",border:quoted?"1px solid #e4e4e4":"none",borderRadius:quoted?6:0,fontStyle:quoted?"italic":"normal",display:"flex",gap:10}}>{numbered&&<span style={{fontWeight:600,color:INK,flexShrink:0}}>{i+1}.</span>}{!numbered&&!quoted&&<span style={{color:FAINT,flexShrink:0}}>—</span>}<span>{quoted?`"${item}"`:item}</span></div>)}</div></div>;}

function App(){
const [mode,setMode]=useState("coach");
const [situation,setSituation]=useState("");
const [context,setContext]=useState("");
const [coaching,setCoaching]=useState(null);
const [loading,setLoading]=useState(false);
const [error,setError]=useState(null);
const [guide,setGuide]=useState(null);
const [guideTitle,setGuideTitle]=useState(null);
const [loadingGuide,setLoadingGuide]=useState(false);

async function callClaude(prompt,maxTokens=1800){
const r=await fetch("https://tsonsino-backend.vercel.app/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:prompt,maxTokens:maxTokens})});
const d=await r.json();return d.text;}

async function getCoaching(){
if(!situation.trim())return;setLoading(true);setError(null);setCoaching(null);
try{const text=await callClaude(`You are an experienced management coach at a fast-scaling company. A manager described a situation and needs practical coaching.\n\nSITUATION: ${situation}\nCONTEXT: ${context||"none"}\n\nFirst screen for escalation: harassment/discrimination allegations, medical/disability disclosures, threats/safety, legal claims, protected leave, pay equity complaints, protected class involvement — these need HR first.\n\nReturn ONLY valid JSON:\n{"escalate":true|false,"escalation_reason":"if true: warm 2-3 sentences on why HR first and what to do now. if false: null","framing":"2-3 sentences reframing what is really going on","steps":["3-5 concrete ordered steps"],"say":["2-4 example phrases they could actually use"],"avoid":["2-4 things NOT to say/do with brief why"],"watch_for":"1-2 sentences on what to pay attention to"}\n\nIf escalate is true, still fill in guidance for the manager role AFTER involving HR. Be practical and direct. No jargon.`);
setCoaching(JSON.parse(text.replace(/```json|```/g,"").trim()));}
catch(e){setError("Something went wrong. Try again.");}
setLoading(false);}

async function getGuide(g){
setGuideTitle(g.label);setLoadingGuide(true);setGuide(null);
try{const text=await callClaude(`You are an experienced management coach. Write a practical one-page guide for a manager on: "${g.label}".\n\nAudience: first-time or early-career manager at a startup. No jargon — what to actually do.\n\nWrite in plain text with CAPS section headings. Structure:\n1. THE GOAL\n2. BEFORE\n3. THE CONVERSATION (with 2-3 example phrases)\n4. COMMON MISTAKES\n5. AFTER\n\nUnder 500 words. Immediately usable.`,1200);setGuide(text);}
catch(e){setGuide("Something went wrong. Try again.");}
setLoadingGuide(false);}

return <div style={{fontFamily:"Inter,system-ui,sans-serif",background:"#fff",minHeight:"100vh",color:INK}}>
<div style={{maxWidth:780,margin:"0 auto",padding:"40px 24px 80px"}}>
<div style={{borderBottom:`1px solid ${RULE}`,paddingBottom:20,marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>HR Toolkit · 02</div>
<h1 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:34,lineHeight:1.15,margin:0}}>Manager Coach</h1>
<p style={{color:MUTED,fontSize:15,maxWidth:560,lineHeight:1.65,marginTop:12,marginBottom:0}}>Real coaching for real situations. Describe what you're dealing with — get a clear way through it. Some things need HR first; this tool will tell you when.</p>
</div>
<div style={{display:"flex",gap:0,marginBottom:28,border:`1px solid ${RULE}`,borderRadius:8,overflow:"hidden",width:"fit-content"}}>
<button onClick={()=>setMode("coach")} style={{padding:"10px 22px",fontSize:13,fontWeight:500,border:"none",cursor:"pointer",background:mode==="coach"?INK:"#fff",color:mode==="coach"?"#fff":MUTED}}>Coach me through a situation</button>
<button onClick={()=>setMode("guides")} style={{padding:"10px 22px",fontSize:13,fontWeight:500,border:"none",cursor:"pointer",background:mode==="guides"?INK:"#fff",color:mode==="guides"?"#fff":MUTED}}>Quick guides</button>
</div>

{mode==="coach"&&<div>
<label style={{fontSize:12,fontWeight:500,color:MUTED,display:"block",marginBottom:6}}>What's the situation?</label>
<textarea value={situation} onChange={e=>setSituation(e.target.value)} placeholder="e.g., One of my strongest engineers has gone quiet in meetings and missed two deadlines. I don't know if something's wrong or if they're checked out." rows={4} style={{...iStyle,resize:"vertical",marginBottom:14}}/>
<label style={{fontSize:12,fontWeight:500,color:MUTED,display:"block",marginBottom:6}}>Any context that matters? <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label>
<textarea value={context} onChange={e=>setContext(e.target.value)} placeholder="e.g., They've been here 2 years, top performer until ~6 weeks ago." rows={2} style={{...iStyle,resize:"vertical",marginBottom:18}}/>
<button onClick={getCoaching} disabled={loading||!situation.trim()} style={{background:INK,color:"#fff",border:"none",padding:"13px 28px",fontSize:14,fontWeight:500,borderRadius:4,cursor:loading?"wait":"pointer",opacity:loading||!situation.trim()?0.6:1}}>{loading?"Thinking it through…":"Coach me"}</button>
{error&&<div style={{color:"#b91c1c",fontSize:13,marginTop:10}}>{error}</div>}
{coaching&&<div style={{marginTop:32}}>
{coaching.escalate&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"16px 20px",marginBottom:24}}><div style={{fontWeight:600,fontSize:14,color:"#b91c1c",marginBottom:6}}>⚠ Loop in HR before acting</div><div style={{fontSize:14,color:"#7f1d1d",lineHeight:1.65}}>{coaching.escalation_reason}</div></div>}
<Section label="The real situation" content={coaching.framing}/>
<SectionList label="How to approach it" items={coaching.steps} numbered/>
<SectionList label="Things you could actually say" items={coaching.say} quoted/>
<SectionList label="What to avoid" items={coaching.avoid}/>
<Section label="Watch for" content={coaching.watch_for}/>
</div>}
</div>}

{mode==="guides"&&<div>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10,marginBottom:28}}>
{QUICK_GUIDES.map(g=><button key={g.id} onClick={()=>getGuide(g)} disabled={loadingGuide} style={{textAlign:"left",padding:"16px 18px",border:guideTitle===g.label?`2px solid ${INK}`:`1px solid ${RULE}`,borderRadius:8,background:"#fff",cursor:loadingGuide?"wait":"pointer",fontSize:14,fontWeight:500,color:INK}}><span style={{marginRight:8}}>{g.emoji}</span>{g.label}</button>)}
</div>
{loadingGuide&&<div style={{color:FAINT,fontSize:14}}>Writing your guide…</div>}
{guide&&!loadingGuide&&<div>
<div style={{borderBottom:`1px solid ${RULE}`,paddingBottom:12,marginBottom:18,display:"flex",alignItems:"baseline",gap:12}}><span style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT}}>Guide</span><span style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:20}}>{guideTitle}</span></div>
<pre style={{whiteSpace:"pre-wrap",fontFamily:"Inter,system-ui,sans-serif",fontSize:14,lineHeight:1.7,color:MUTED,background:"#fafafa",border:`1px solid ${RULE}`,borderRadius:8,padding:"24px 28px",margin:0}}>{guide}</pre>
</div>}
</div>}

<div style={{marginTop:60,paddingTop:20,borderTop:`1px solid ${RULE}`,fontSize:12,color:FAINT,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
<span>Manager Coach · HR Toolkit for lean, scaling teams</span>
<a href="../index.html" style={{color:FAINT,textDecoration:"none"}}>Built by Trinh Sonsino</a>
</div>
</div></div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
