<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>New Hire Onboarding · Trinh Sonsino HR Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:#fff;}.back-link{font-size:13px;color:#555;text-decoration:none;padding:16px 24px;display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid #e4e4e4;width:100%;}.back-link:hover{color:#0f0f0f;}</style>
</head>
<body>
<a href="../index.html" class="back-link"><-lt;- Back to Trinh Sonsino</a>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const INK="#0f0f0f",MUTED="#555",FAINT="#9a9a9a",RULE="#e4e4e4";
const HIRE_TYPES=[{id:"ic",label:"Individual contributor"},{id:"lead",label:"Team lead / manager"},{id:"exec",label:"Senior leader / exec"},{id:"first",label:"First in this function"}];
const REMOTE_TYPES=[{id:"onsite",label:"On-site"},{id:"hybrid",label:"Hybrid"},{id:"remote",label:"Fully remote"}];
const TABS=[{id:"plan",label:"30/60/90 Plan"},{id:"week1",label:"First Week"},{id:"manager",label:"Manager Prep"}];
const iStyle={width:"100%",boxSizing:"border-box",border:"1px solid #e4e4e4",borderRadius:6,padding:"11px 14px",fontSize:14,fontFamily:"inherit",color:"#0f0f0f",outline:"none",background:"#fff"};
const lStyle={fontSize:12,fontWeight:500,color:MUTED,display:"block",marginBottom:6};
const subLabel={fontSize:11,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:FAINT,marginBottom:10};

function Block({title,items,accent}){return <div style={{marginBottom:22}}><div style={subLabel}>{title}</div><div style={{display:"grid",gap:7}}>{items.map((item,i)=><div key={i} style={{fontSize:14,color:MUTED,lineHeight:1.65,padding:accent?"10px 14px":"0",background:accent?"#fafafa":"transparent",border:accent?"1px solid #e4e4e4":"none",borderRadius:accent?6:0,display:"flex",gap:10,alignItems:"flex-start"}}>{!accent&&<span style={{color:FAINT,flexShrink:0,marginTop:2}}>-</span>}<span>{item}</span></div>)}</div></div>;}
function List({items,check}){return <div style={{display:"grid",gap:7}}>{items.map((item,i)=><div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",fontSize:14,color:MUTED,lineHeight:1.6}}><span style={{flexShrink:0,marginTop:2,color:FAINT}}>{check?"[ ]":"·"}</span><span>{item}</span></div>)}</div>;}

function App(){
const [hirerName,setHirerName]=useState("");const [role,setRole]=useState("");const [hireType,setHireType]=useState("ic");const [remoteType,setRemoteType]=useState("hybrid");const [startDate,setStartDate]=useState("");const [teamContext,setTeamContext]=useState("");const [topPriorities,setTopPriorities]=useState("");const [knownChallenges,setKnownChallenges]=useState("");const [successLooks,setSuccessLooks]=useState("");const [tools,setTools]=useState("");
const [output,setOutput]=useState(null);const [loading,setLoading]=useState(false);const [error,setError]=useState(null);const [activeTab,setActiveTab]=useState("plan");const [copied,setCopied]=useState(false);
const ready=role.trim()&&topPriorities.trim();
const hireTypeLabel=HIRE_TYPES.find(h=>h.id===hireType)?.label||hireType;
const remoteLabel=REMOTE_TYPES.find(r=>r.id===remoteType)?.label||remoteType;

async function generate(){
if(!ready)return;setLoading(true);setError(null);setOutput(null);setActiveTab("plan");
try{
const r=await fetch("https://tsonsino-backend.vercel.app/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({maxTokens:3000,prompt:`You are an experienced HR leader helping a manager onboard a new hire well. Generic onboarding fails - build a specific, practical onboarding package.\n\nHIRE PROFILE:\n- Role: ${role}\n- Type: ${hireTypeLabel}\n- Work model: ${remoteLabel}\n- Start date: ${startDate||"not specified"}\n- Manager: ${hirerName||"not specified"}\n- Team context: ${teamContext||"not provided"}\n- Top 3 priorities: ${topPriorities}\n- Known challenges: ${knownChallenges||"none"}\n- Success at 90 days: ${successLooks||"not specified"}\n- Key tools: ${tools||"not specified"}\n\nReturn ONLY valid JSON:\n{"summary":"2 sentences on the most important thing to get right","plan_30_60_90":{"day_30":{"theme":"short theme","goals":["3-4 specific role-relevant goals"],"milestones":["2-3 concrete verifiable milestones"],"watch_for":"one sentence failure mode"},"day_60":{"theme":"...","goals":[...],"milestones":[...],"watch_for":"..."},"day_90":{"theme":"...","goals":[...],"milestones":[...],"watch_for":"..."}},"week_one":{"before_day_one":["3-5 specific things manager does BEFORE hire starts"],"day_one":["4-5 specific ordered activities"],"days_2_5":["4-6 activities for days 2-5"],"end_of_week_checklist":["3-4 things to verify true by end of week one"]},"manager_prep":{"before_they_arrive":["4-6 concrete prep items with specifics"],"conversations_to_have":[{"timing":"Day 1","topic":"what to cover","why":"why early"},{"timing":"End of week 1","topic":"...","why":"..."},{"timing":"30-day check-in","topic":"...","why":"..."},{"timing":"60-day check-in","topic":"...","why":"..."}],"common_manager_mistakes":["3-4 specific mistakes for this hire type"],"remote_specific":${remoteType==="remote"?"3-4 specific remote onboarding actions":"null"}}}\n\nEvery item must be specific to THIS role. First-in-function hires need explicit callout. Be direct and actionable.`}))});
const d=await r.json();const text=d.text;
setOutput(JSON.parse(text.replace(/```json|```/g,"").trim()));}
catch(e){setError("Something went wrong. Try again.");}
setLoading(false);}

function copyTab(){
if(!output)return;let text="";
if(activeTab==="plan"){const p=output.plan_30_60_90;["day_30","day_60","day_90"].forEach((d,i)=>{const ph=p[d];text+=`${["30","60","90"][i]}-DAY: ${ph.theme}\n\nGoals:\n${ph.goals.map(g=>`* ${g}`).join("\n")}\n\nMilestones:\n${ph.milestones.map(m=>`* ${m}`).join("\n")}\n\nWatch for: ${ph.watch_for}\n\n`;});}
else if(activeTab==="week1"){const w=output.week_one;text+=`BEFORE DAY ONE\n${w.before_day_one.map(i=>`* ${i}`).join("\n")}\n\nDAY ONE\n${w.day_one.map(i=>`* ${i}`).join("\n")}\n\nDAYS 2-5\n${w.days_2_5.map(i=>`* ${i}`).join("\n")}\n\nEND OF WEEK\n${w.end_of_week_checklist.map(i=>`[ ] ${i}`).join("\n")}`;}
else{const m=output.manager_prep;text+=`BEFORE THEY ARRIVE\n${m.before_they_arrive.map(i=>`* ${i}`).join("\n")}\n\nKEY CONVERSATIONS\n${m.conversations_to_have.map(c=>`${c.timing}: ${c.topic}`).join("\n")}\n\nCOMMON MISTAKES\n${m.common_manager_mistakes.map(i=>`* ${i}`).join("\n")}`;}
const el=document.createElement("textarea");el.value=text;document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);setCopied(true);setTimeout(()=>setCopied(false),2000);}

return <div style={{fontFamily:"Inter,system-ui,sans-serif",background:"#fff",minHeight:"100vh",color:INK}}>
<div style={{maxWidth:800,margin:"0 auto",padding:"40px 24px 80px"}}>
<div style={{borderBottom:`1px solid ${RULE}`,paddingBottom:20,marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>HR Toolkit · 05</div>
<h1 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:34,lineHeight:1.15,margin:0}}>New Hire Onboarding</h1>
<p style={{color:MUTED,fontSize:15,maxWidth:560,lineHeight:1.65,marginTop:12,marginBottom:0}}>Generic onboarding fails because it's built for the company, not the role. Fill this out before day one and get a 30/60/90 plan, first-week schedule, and manager prep checklist.</p>
</div>

{!output&&<div>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:14}}>About the hire</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
<div><label style={lStyle}>Role title</label><input value={role} onChange={e=>setRole(e.target.value)} placeholder="e.g., Senior Engineer" style={iStyle}/></div>
<div><label style={lStyle}>Manager name <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label><input value={hirerName} onChange={e=>setHirerName(e.target.value)} placeholder="Your name" style={iStyle}/></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
<div><label style={lStyle}>Start date <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label><input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={iStyle}/></div>
<div><label style={lStyle}>Work model</label><div style={{display:"flex",gap:8,marginTop:2}}>{REMOTE_TYPES.map(r=><button key={r.id} onClick={()=>setRemoteType(r.id)} style={{flex:1,padding:"10px 8px",fontSize:12,fontWeight:500,border:remoteType===r.id?`2px solid ${INK}`:`1px solid ${RULE}`,borderRadius:6,background:"#fff",cursor:"pointer",color:INK}}>{r.label}</button>)}</div></div>
</div>
<label style={lStyle}>Type of hire</label>
<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>{HIRE_TYPES.map(h=><button key={h.id} onClick={()=>setHireType(h.id)} style={{padding:"10px 8px",fontSize:12,fontWeight:500,textAlign:"center",border:hireType===h.id?`2px solid ${INK}`:`1px solid ${RULE}`,borderRadius:6,background:"#fff",cursor:"pointer",color:INK,lineHeight:1.3}}>{h.label}</button>)}</div>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,margin:"24px 0 14px"}}>Context</div>
<label style={lStyle}>Team context <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label>
<textarea value={teamContext} onChange={e=>setTeamContext(e.target.value)} placeholder="e.g., 6-person eng team, fast-paced, async-first" rows={2} style={{...iStyle,resize:"vertical",marginBottom:14}}/>
<label style={lStyle}>Top 3 priorities for this person in the first 90 days</label>
<textarea value={topPriorities} onChange={e=>setTopPriorities(e.target.value)} placeholder="e.g., 1. Own the auth service refactor 2. Establish code review norms 3. Onboard to deploy process" rows={3} style={{...iStyle,resize:"vertical",marginBottom:14}}/>
<label style={lStyle}>Known challenges or landmines <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label>
<textarea value={knownChallenges} onChange={e=>setKnownChallenges(e.target.value)} placeholder="e.g., Previous person left on bad terms, codebase has tech debt they'll hit fast" rows={2} style={{...iStyle,resize:"vertical",marginBottom:14}}/>
<label style={lStyle}>What does success look like at 90 days? <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label>
<textarea value={successLooks} onChange={e=>setSuccessLooks(e.target.value)} placeholder="e.g., Shipping independently, relationships established with 3 main stakeholders" rows={2} style={{...iStyle,resize:"vertical",marginBottom:14}}/>
<label style={lStyle}>Key tools / systems they'll need <span style={{color:FAINT,fontWeight:400}}>(optional)</span></label>
<input value={tools} onChange={e=>setTools(e.target.value)} placeholder="e.g., GitHub, Notion, Figma, Salesforce" style={{...iStyle,marginBottom:24}}/>
<button onClick={generate} disabled={loading||!ready} style={{background:INK,color:"#fff",border:"none",padding:"13px 28px",fontSize:14,fontWeight:500,borderRadius:4,cursor:loading?"wait":"pointer",opacity:loading||!ready?0.6:1}}>{loading?"Building the onboarding plan...":"Generate onboarding package"}</button>
{error&&<div style={{color:"#b91c1c",fontSize:13,marginTop:10}}>{error}</div>}
</div>}

{output&&<div>
<div style={{background:"#fafafa",border:`1px solid ${RULE}`,borderRadius:8,padding:"16px 20px",marginBottom:24,fontSize:14,color:MUTED,lineHeight:1.7}}><span style={{fontWeight:600,color:INK}}>The most important thing: </span>{output.summary}</div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
<div style={{display:"flex",gap:0,border:`1px solid ${RULE}`,borderRadius:8,overflow:"hidden"}}>{TABS.map(t=><button key={t.id} onClick={()=>setActiveTab(t.id)} style={{padding:"10px 18px",fontSize:13,fontWeight:500,border:"none",cursor:"pointer",background:activeTab===t.id?INK:"#fff",color:activeTab===t.id?"#fff":MUTED}}>{t.label}</button>)}</div>
<div style={{display:"flex",gap:10}}>
<button onClick={copyTab} style={{border:"1px solid #ccc",background:"#fff",padding:"9px 16px",fontSize:13,fontWeight:500,borderRadius:4,cursor:"pointer"}}>{copied?"Copied v":"Copy this section"}</button>
<button onClick={()=>{setOutput(null);setError(null);}} style={{border:"1px solid #ccc",background:"#fff",padding:"9px 16px",fontSize:13,fontWeight:500,borderRadius:4,cursor:"pointer",color:MUTED}}>Start over</button>
</div>
</div>

{activeTab==="plan"&&<div>{[{key:"day_30",label:"30 days",color:INK},{key:"day_60",label:"60 days",color:"#444"},{key:"day_90",label:"90 days",color:"#666"}].map(({key,label,color})=>{const phase=output.plan_30_60_90[key];return <div key={key} style={{marginBottom:28}}><div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:4}}><span style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:22,color}}>{label}</span><span style={{fontSize:13,color:FAINT,fontStyle:"italic"}}>{phase.theme}</span></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}><div><div style={subLabel}>Goals</div><List items={phase.goals}/></div><div><div style={subLabel}>Milestones</div><List items={phase.milestones} check/></div></div><div style={{marginTop:10,fontSize:13,color:"#a16207",background:"#fffbeb",border:"1px solid #fde68a",borderRadius:6,padding:"8px 12px"}}><strong>Watch for:</strong> {phase.watch_for}</div>{key!=="day_90"&&<div style={{borderBottom:`1px solid ${RULE}`,marginTop:20}}/>}</div>;})}</div>}

{activeTab==="week1"&&<div>
<Block title="Before day one" items={output.week_one.before_day_one} accent/>
<Block title="Day one" items={output.week_one.day_one}/>
<Block title="Days 2-5" items={output.week_one.days_2_5}/>
<div style={{marginTop:20}}><div style={subLabel}>End of week one - verify these are true</div>{output.week_one.end_of_week_checklist.map((item,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10,fontSize:14,color:MUTED,lineHeight:1.6}}><span style={{fontSize:16,flexShrink:0,marginTop:1}}>[ ]</span><span>{item}</span></div>)}</div>
</div>}

{activeTab==="manager"&&<div>
<div style={{marginBottom:28}}><div style={subLabel}>Before they arrive</div><List items={output.manager_prep.before_they_arrive}/></div>
<div style={{marginBottom:28}}><div style={subLabel}>Key conversations to have</div><div style={{display:"grid",gap:10}}>{output.manager_prep.conversations_to_have.map((c,i)=><div key={i} style={{border:`1px solid ${RULE}`,borderRadius:8,padding:"14px 18px"}}><div style={{display:"flex",gap:10,alignItems:"baseline",marginBottom:4,flexWrap:"wrap"}}><span style={{fontWeight:600,fontSize:13,color:INK}}>{c.timing}</span><span style={{fontSize:14,color:MUTED}}>{c.topic}</span></div><div style={{fontSize:13,color:FAINT,lineHeight:1.5}}>{c.why}</div></div>)}</div></div>
<div style={{marginBottom:28}}><div style={subLabel}>Common mistakes with this hire type</div><List items={output.manager_prep.common_manager_mistakes}/></div>
{output.manager_prep.remote_specific&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"14px 18px"}}><div style={{fontWeight:600,fontSize:12,color:"#1d4ed8",letterSpacing:"0.05em",textTransform:"uppercase",marginBottom:8}}>Remote onboarding</div><p style={{fontSize:14,color:"#1e3a6e",lineHeight:1.7,margin:0}}>{output.manager_prep.remote_specific}</p></div>}
</div>}
</div>}

<div style={{marginTop:60,paddingTop:20,borderTop:`1px solid ${RULE}`,fontSize:12,color:FAINT,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
<span>New Hire Onboarding · HR Toolkit for lean, scaling teams</span>
<a href="../index.html" style={{color:FAINT,textDecoration:"none"}}>Built by Trinh Sonsino</a>
</div>
</div></div>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
