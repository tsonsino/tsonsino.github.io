<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Headcount Planning · Trinh Sonsino HR Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Inter',sans-serif;background:#fff;}.back-link{font-size:13px;color:#555;text-decoration:none;padding:16px 24px;display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid #e4e4e4;width:100%;}.back-link:hover{color:#0f0f0f;}</style>
</head>
<body>
<a href="../index.html" class="back-link"><-lt;- Back to Trinh Sonsino</a>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const INK="#0f0f0f",MUTED="#555",FAINT="#9a9a9a",RULE="#e4e4e4",ACCENT="#2563eb";
const QUARTERS=["Q1","Q2","Q3","Q4"];
const FUNCTIONS=["Engineering","Product","Design","Sales","Marketing","Customer Success","Operations","Finance","HR / People","Legal","Other"];
const LEVELS=["IC - Junior","IC - Mid","IC - Senior","IC - Staff / Principal","Manager","Director","VP / Head of","C-Suite"];
const PRIORITIES=[{id:"critical",label:"Critical",color:"#b91c1c",bg:"#fef2f2",sub:"Blocks the business without it"},{id:"important",label:"Important",color:"#a16207",bg:"#fffbeb",sub:"Needed for planned growth"},{id:"planned",label:"Planned",color:"#1d4ed8",bg:"#eff6ff",sub:"Part of the roadmap"}];
const RAMP_MONTHS={"IC - Junior":3,"IC - Mid":2,"IC - Senior":2,"IC - Staff / Principal":3,"Manager":3,"Director":4,"VP / Head of":4,"C-Suite":6};
const flagTypes={weak_justification:{label:"Weak justification",color:"#b91c1c",bg:"#fef2f2"},timing_risk:{label:"Timing risk",color:"#a16207",bg:"#fffbeb"},cost_concern:{label:"Cost concern",color:"#a16207",bg:"#fffbeb"},dependency:{label:"Dependency",color:"#1d4ed8",bg:"#eff6ff"},missing_role:{label:"Missing role",color:"#555",bg:"#f0f0f0"},priority_question:{label:"Priority question",color:"#a16207",bg:"#fffbeb"}};
const iStyle={width:"100%",boxSizing:"border-box",border:"1px solid #e4e4e4",borderRadius:6,padding:"11px 14px",fontSize:14,fontFamily:"inherit",color:"#0f0f0f",outline:"none",background:"#fff"};
const lStyle={fontSize:12,fontWeight:500,color:MUTED,display:"block",marginBottom:6};

function calcTrueCost(base,level){
if(!base||isNaN(base))return null;
const loaded=base*1.3;const recruiting=base*0.2;const ramp=RAMP_MONTHS[level]||3;const rampCost=(loaded/12)*ramp*0.5;const firstYearCost=loaded+recruiting+rampCost;
return{loaded,recruiting,rampCost,firstYearCost};}

function Sublabel({text}){return <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",color:FAINT,marginBottom:8}}>{text}</div>;}
function ABlock({label,content}){if(!content)return null;return <div style={{marginBottom:24}}><Sublabel text={label}/><p style={{fontSize:14,color:MUTED,lineHeight:1.75,margin:0}}>{content}</p></div>;}

function App(){
const [year,setYear]=useState(new Date().getFullYear()+1);const [company,setCompany]=useState("");const [currentHC,setCurrentHC]=useState("");const [revenueGoal,setRevenueGoal]=useState("");const [roles,setRoles]=useState([]);const [showForm,setShowForm]=useState(false);const [analysis,setAnalysis]=useState(null);const [loading,setLoading]=useState(false);const [error,setError]=useState(null);const [copied,setCopied]=useState(false);
const [form,setForm]=useState({id:null,title:"",function:"",level:"IC - Mid",quarter:"Q1",base:"",goal:"",impact:"",priority:"important"});

function resetForm(){setForm({id:null,title:"",function:"",level:"IC - Mid",quarter:"Q1",base:"",goal:"",impact:"",priority:"important"});setShowForm(false);}
function saveRole(){if(!form.title.trim()||!form.function)return;if(form.id){setRoles(rs=>rs.map(r=>r.id===form.id?{...form}:r));}else{setRoles(rs=>[...rs,{...form,id:Date.now()}]);}resetForm();}
function editRole(role){setForm({...role});setShowForm(true);}
function deleteRole(id){setRoles(rs=>rs.filter(r=>r.id!==id));}

const totalBase=roles.reduce((sum,r)=>sum+(parseFloat(r.base)||0),0);
const totalFirstYear=roles.reduce((sum,r)=>{const c=calcTrueCost(parseFloat(r.base)*1000,r.level);return sum+(c?.firstYearCost||0);},0);
const byQuarter=QUARTERS.map(q=>({q,roles:roles.filter(r=>r.quarter===q),cost:roles.filter(r=>r.quarter===q).reduce((sum,r)=>{const c=calcTrueCost(parseFloat(r.base)*1000,r.level);return sum+(c?.firstYearCost||0);},0)}));
const byFunction=FUNCTIONS.map(f=>({f,roles:roles.filter(r=>r.function===f)})).filter(x=>x.roles.length>0);

async function generateAnalysis(){
if(roles.length===0)return;setLoading(true);setError(null);setAnalysis(null);
try{
const planSummary=roles.map(r=>{const cost=calcTrueCost(parseFloat(r.base)*1000,r.level);return `${r.quarter} - ${r.title} (${r.function}, ${r.level}) | Priority: ${r.priority} | Base: $${r.base||"?"}k | First-year true cost: $${cost?Math.round(cost.firstYearCost/1000)+"k":"unknown"} | Business goal: ${r.goal||"not specified"} | Impact if not hired: ${r.impact||"not specified"}`;}).join("\n");
const resp=await fetch("https://tsonsino-backend.vercel.app/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({maxTokens:2000,prompt:`You are an experienced HR and finance advisor reviewing a startup's annual headcount plan. Give honest, specific feedback - flag risks, spot gaps, challenge weak justifications.\n\nCompany: ${company||"not specified"}\nCurrent HC: ${currentHC||"not specified"}\nRevenue goal ${year}: ${revenueGoal||"not specified"}\nTotal roles: ${roles.length}\nBase commitment: $${Math.round(totalBase)}k\nFirst-year true cost: $${Math.round(totalFirstYear/1000)}k\n\nPlan:\n${planSummary}\n\nReturn ONLY valid JSON:\n{"overall_read":"3-4 sentences honest assessment - realistic, aggressive, conservative? Does timing make sense?","financial_reality":"2-3 sentences on what this truly costs vs what it looks like on paper","flags":[{"role":"role title","type":"weak_justification|timing_risk|cost_concern|dependency|missing_role|priority_question","note":"1-2 sentences on specific concern"}],"sequencing_advice":"2-3 sentences on quarterly sequencing - are critical roles coming online at right time?","missing_roles":"1-2 sentences on obvious gaps - only if genuinely obvious","questions_for_leadership":["3-5 questions leadership should answer before board approval - specific to THIS plan"],"green_lights":["1-3 things that look well-thought-out - specific not generic. Empty array if nothing stands out"]}\n\nBe direct. Weak justifications must be flagged. Q1 hire with 3-month ramp doesn't contribute until Q2.`}))});
const d=await resp.json();const text=d.text;
setAnalysis(JSON.parse(text.replace(/```json|```/g,"").trim()));}
catch(e){setError("Something went wrong. Try again.");}
setLoading(false);}

function copyPlan(){
const lines=[`HEADCOUNT PLAN ${year}`,`Company: ${company||"-"} | Current HC: ${currentHC||"-"} | Revenue goal: ${revenueGoal||"-"}`,`Total roles: ${roles.length} | Base: $${Math.round(totalBase)}k | First-year true cost: $${Math.round(totalFirstYear/1000)}k`,"",
...QUARTERS.map(q=>{const qr=roles.filter(r=>r.quarter===q);if(!qr.length)return null;return[`\n${q}`,...qr.map(r=>`  * ${r.title} (${r.function}, ${r.level}) - ${r.priority} | Base: $${r.base||"?"}k`)].join("\n");}).filter(Boolean)];
const el=document.createElement("textarea");el.value=lines.join("\n");document.body.appendChild(el);el.select();document.execCommand("copy");document.body.removeChild(el);setCopied(true);setTimeout(()=>setCopied(false),2000);}

return <div style={{fontFamily:"Inter,system-ui,sans-serif",background:"#fff",minHeight:"100vh",color:INK}}>
<div style={{maxWidth:860,margin:"0 auto",padding:"40px 24px 80px"}}>
<div style={{borderBottom:`1px solid ${RULE}`,paddingBottom:20,marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.14em",textTransform:"uppercase",color:FAINT,marginBottom:10}}>HR Toolkit · 09</div>
<h1 style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:34,lineHeight:1.15,margin:0}}>Headcount Planning</h1>
<p style={{color:MUTED,fontSize:15,maxWidth:600,lineHeight:1.7,marginTop:12,marginBottom:0}}>Reactive hiring is expensive hiring. This tool forces intentionality before urgency hits - every role needs a business justification and a true cost view before it becomes a req.</p>
</div>

<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 80px",gap:12,marginBottom:28}}>
<div><label style={lStyle}>Company</label><input value={company} onChange={e=>setCompany(e.target.value)} placeholder="e.g., Acme Corp" style={iStyle}/></div>
<div><label style={lStyle}>Current headcount</label><input value={currentHC} onChange={e=>setCurrentHC(e.target.value)} placeholder="e.g., 45" style={iStyle}/></div>
<div><label style={lStyle}>Revenue / growth goal</label><input value={revenueGoal} onChange={e=>setRevenueGoal(e.target.value)} placeholder="e.g., $5M ARR" style={iStyle}/></div>
<div><label style={lStyle}>Year</label><input value={year} onChange={e=>setYear(e.target.value)} style={iStyle}/></div>
</div>

{roles.length>0&&<div style={{display:"flex",gap:0,border:`1px solid ${RULE}`,borderRadius:8,overflow:"hidden",marginBottom:28}}>
{[{label:"Roles planned",val:roles.length},{label:"Base salary total",val:`$${Math.round(totalBase)}k`},{label:"True first-year cost",val:`$${Math.round(totalFirstYear/1000)}k`,highlight:true},{label:"Critical roles",val:roles.filter(r=>r.priority==="critical").length}].map((s,i)=><div key={i} style={{flex:1,padding:"14px 18px",borderRight:i<3?`1px solid ${RULE}`:"none",background:s.highlight?"#fffbeb":"#fff"}}><div style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:22,lineHeight:1,marginBottom:4,color:s.highlight?"#a16207":INK}}>{s.val}</div><div style={{fontSize:11,color:FAINT}}>{s.label}</div></div>)}
</div>}

<div style={{marginBottom:28}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT}}>Annual plan - {year}</div>
<div style={{display:"flex",gap:10}}>
{roles.length>0&&<button onClick={copyPlan} style={{border:"1px solid #ccc",background:"#fff",padding:"8px 14px",fontSize:12,fontWeight:500,borderRadius:4,cursor:"pointer"}}>{copied?"Copied v":"Copy plan"}</button>}
<button onClick={()=>{setShowForm(true);setForm({id:null,title:"",function:"",level:"IC - Mid",quarter:"Q1",base:"",goal:"",impact:"",priority:"important"});}} style={{background:INK,color:"#fff",border:"none",padding:"8px 16px",fontSize:12,fontWeight:500,borderRadius:4,cursor:"pointer"}}>+ Add role</button>
</div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}}>
{byQuarter.map(({q,roles:qRoles,cost})=><div key={q} style={{border:`1px solid ${RULE}`,borderRadius:8,overflow:"hidden"}}>
<div style={{padding:"10px 14px",background:"#fafafa",borderBottom:`1px solid ${RULE}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:600,fontSize:14}}>{q}</span><span style={{fontSize:11,color:FAINT}}>{qRoles.length} role{qRoles.length!==1?"s":""}</span></div>
<div style={{padding:10,minHeight:80}}>
{qRoles.length===0?<div style={{fontSize:12,color:RULE,padding:"8px 4px"}}>No roles planned</div>:
qRoles.map(r=>{const pr=PRIORITIES.find(p=>p.id===r.priority);return <div key={r.id} style={{border:`1px solid ${RULE}`,borderRadius:6,padding:"8px 10px",marginBottom:8,cursor:"pointer"}} onClick={()=>editRole(r)}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}><span style={{fontWeight:600,fontSize:12}}>{r.title}</span><span style={{background:pr?.bg,color:pr?.color,fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:20,textTransform:"uppercase",letterSpacing:"0.05em"}}>{pr?.label}</span></div><div style={{fontSize:11,color:FAINT}}>{r.function} · {r.level}</div>{r.base&&<div style={{fontSize:11,color:ACCENT,marginTop:3}}>${r.base}k base</div>}</div>;})}
</div>
{cost>0&&<div style={{padding:"8px 14px",borderTop:`1px solid ${RULE}`,background:"#fafafa",fontSize:11,color:"#a16207"}}>~${Math.round(cost/1000)}k first-year cost</div>}
</div>)}
</div>
</div>

{byFunction.length>0&&<div style={{marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:12}}>By function</div>
<div style={{display:"flex",flexWrap:"wrap",gap:8}}>{byFunction.map(({f,roles:fr})=><div key={f} style={{border:`1px solid ${RULE}`,borderRadius:6,padding:"8px 14px",fontSize:13}}><span style={{fontWeight:600}}>{f}</span><span style={{color:FAINT,marginLeft:8}}>{fr.length} role{fr.length!==1?"s":""}</span></div>)}</div>
</div>}

{roles.some(r=>r.base)&&<div style={{border:`1px solid ${RULE}`,borderRadius:8,padding:"18px 20px",marginBottom:28}}>
<div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT,marginBottom:14}}>True cost breakdown - what leadership needs to see</div>
<div style={{display:"grid",gap:8}}>
{roles.filter(r=>r.base).map(r=>{const cost=calcTrueCost(parseFloat(r.base)*1000,r.level);if(!cost)return null;return <div key={r.id} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 80px",gap:8,fontSize:12,alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${RULE}`}}><div><span style={{fontWeight:600}}>{r.title}</span> <span style={{color:FAINT}}>({r.quarter})</span></div><div style={{textAlign:"right",color:MUTED}}>${r.base}k<div style={{fontSize:10,color:FAINT}}>base</div></div><div style={{textAlign:"right",color:MUTED}}>${Math.round(cost.recruiting/1000)}k<div style={{fontSize:10,color:FAINT}}>recruiting</div></div><div style={{textAlign:"right",color:MUTED}}>${Math.round(cost.rampCost/1000)}k<div style={{fontSize:10,color:FAINT}}>ramp cost</div></div><div style={{textAlign:"right",fontWeight:600,color:"#a16207"}}>${Math.round(cost.firstYearCost/1000)}k<div style={{fontSize:10,color:FAINT}}>year 1 total</div></div></div>;})}
<div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 80px",gap:8,fontSize:12,alignItems:"center",padding:"10px 0 0"}}><div style={{fontWeight:600}}>TOTAL</div><div style={{textAlign:"right",fontWeight:600}}>${Math.round(totalBase)}k</div><div/><div/><div style={{textAlign:"right",fontWeight:700,color:"#a16207"}}>${Math.round(totalFirstYear/1000)}k</div></div>
</div>
<p style={{fontSize:12,color:FAINT,marginTop:12,lineHeight:1.6}}>True cost = base × 1.3 (benefits + payroll taxes + equipment) + ~20% recruiting + reduced productivity during ramp (varies by level).</p>
</div>}

{roles.length>=2&&!analysis&&<div style={{marginBottom:28}}>
<button onClick={generateAnalysis} disabled={loading} style={{background:INK,color:"#fff",border:"none",padding:"13px 28px",fontSize:14,fontWeight:500,borderRadius:4,cursor:loading?"wait":"pointer",opacity:loading?0.6:1}}>{loading?"Analyzing the plan...":"Get AI analysis of this plan"}</button>
<p style={{fontSize:12,color:FAINT,marginTop:8}}>Flags weak justifications, timing risks, and gaps.</p>
{error&&<div style={{color:"#b91c1c",fontSize:13,marginTop:8}}>{error}</div>}
</div>}

{analysis&&<div style={{marginBottom:28}}>
<div style={{borderBottom:`1px solid ${RULE}`,paddingBottom:12,marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div style={{display:"flex",alignItems:"baseline",gap:12}}><span style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:FAINT}}>Analysis</span><span style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:20}}>Plan review</span></div>
<button onClick={generateAnalysis} disabled={loading} style={{border:"1px solid #ccc",background:"#fff",padding:"7px 14px",fontSize:12,fontWeight:500,borderRadius:4,cursor:"pointer"}}>{loading?"Refreshing...":"Refresh"}</button>
</div>
<ABlock label="Overall read" content={analysis.overall_read}/>
<ABlock label="Financial reality" content={analysis.financial_reality}/>
{analysis.flags?.length>0&&<div style={{marginBottom:24}}><Sublabel text="Flags"/><div style={{display:"grid",gap:8}}>{analysis.flags.map((f,i)=>{const ft=flagTypes[f.type]||{label:f.type,color:MUTED,bg:"#fafafa"};return <div key={i} style={{border:`1px solid ${RULE}`,borderRadius:8,padding:"12px 16px"}}><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}><span style={{fontWeight:600,fontSize:13}}>{f.role}</span><span style={{background:ft.bg,color:ft.color,fontSize:10,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",padding:"2px 8px",borderRadius:20}}>{ft.label}</span></div><div style={{fontSize:13,color:MUTED,lineHeight:1.65}}>{f.note}</div></div>;})}</div></div>}
<ABlock label="Sequencing" content={analysis.sequencing_advice}/>
{analysis.missing_roles&&<ABlock label="Potential gaps" content={analysis.missing_roles}/>}
{analysis.questions_for_leadership?.length>0&&<div style={{marginBottom:24}}><Sublabel text="Questions before board approval"/><div style={{display:"grid",gap:8}}>{analysis.questions_for_leadership.map((q,i)=><div key={i} style={{background:"#fafafa",border:`1px solid ${RULE}`,borderRadius:6,padding:"10px 14px",fontSize:13,color:MUTED,lineHeight:1.6}}>{q}</div>)}</div></div>}
{analysis.green_lights?.length>0&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"14px 18px",marginBottom:24}}><Sublabel text="What looks solid"/>{analysis.green_lights.map((g,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:6,fontSize:13,color:"#166534",lineHeight:1.6}}><span style={{flexShrink:0}}>v</span><span>{g}</span></div>)}</div>}
</div>}

{showForm&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:24}}>
<div style={{background:"#fff",borderRadius:12,padding:32,maxWidth:560,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}><span style={{fontFamily:"DM Serif Display,Georgia,serif",fontSize:20}}>{form.id?"Edit role":"Add a role"}</span><button onClick={resetForm} style={{border:"none",background:"none",fontSize:20,cursor:"pointer",color:FAINT}}>×</button></div>
<div style={{display:"grid",gap:14}}>
<div><label style={lStyle}>Role title</label><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="e.g., Senior Engineer" style={iStyle}/></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label style={lStyle}>Function</label><select value={form.function} onChange={e=>setForm(f=>({...f,function:e.target.value}))} style={{...iStyle,height:42}}><option value="">Select...</option>{FUNCTIONS.map(fn=><option key={fn}>{fn}</option>)}</select></div>
<div><label style={lStyle}>Level</label><select value={form.level} onChange={e=>setForm(f=>({...f,level:e.target.value}))} style={{...iStyle,height:42}}>{LEVELS.map(l=><option key={l}>{l}</option>)}</select></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label style={lStyle}>Target quarter</label><div style={{display:"flex",gap:6}}>{QUARTERS.map(q=><button key={q} onClick={()=>setForm(f=>({...f,quarter:q}))} style={{flex:1,padding:"10px 4px",fontSize:12,fontWeight:500,border:form.quarter===q?`2px solid ${INK}`:`1px solid ${RULE}`,borderRadius:6,background:"#fff",cursor:"pointer"}}>{q}</button>)}</div></div>
<div><label style={lStyle}>Base salary ($k)</label><input value={form.base} onChange={e=>setForm(f=>({...f,base:e.target.value}))} placeholder="e.g., 160" style={iStyle}/></div>
</div>
<div><label style={lStyle}>Priority</label><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{PRIORITIES.map(p=><button key={p.id} onClick={()=>setForm(f=>({...f,priority:p.id}))} style={{textAlign:"left",padding:"10px 12px",border:form.priority===p.id?`2px solid ${p.color}`:`1px solid ${RULE}`,borderRadius:8,background:form.priority===p.id?p.bg:"#fff",cursor:"pointer"}}><div style={{fontWeight:600,fontSize:12,color:p.color,marginBottom:2}}>{p.label}</div><div style={{fontSize:11,color:FAINT,lineHeight:1.3}}>{p.sub}</div></button>)}</div></div>
<div><label style={lStyle}>What business goal does this role support?</label><textarea value={form.goal} onChange={e=>setForm(f=>({...f,goal:e.target.value}))} placeholder="e.g., Hit $3M ARR by Q3 - this role owns the mid-market sales pipeline we don't currently have capacity for." rows={2} style={{...iStyle,resize:"vertical"}}/></div>
<div><label style={lStyle}>What's the cost of NOT hiring?</label><textarea value={form.impact} onChange={e=>setForm(f=>({...f,impact:e.target.value}))} placeholder="e.g., Product launches continue to slip 4-6 weeks because eng is bottlenecked." rows={2} style={{...iStyle,resize:"vertical"}}/></div>
</div>
<div style={{display:"flex",gap:10,marginTop:24,justifyContent:"flex-end"}}>
{form.id&&<button onClick={()=>{deleteRole(form.id);resetForm();}} style={{border:"1px solid #fecaca",background:"#fef2f2",color:"#b91c1c",padding:"11px 18px",fontSize:13,fontWeight:500,borderRadius:4,cursor:"pointer"}}>Delete</button>}
<button onClick={resetForm} style={{border:"1px solid #ccc",background:"#fff",color:MUTED,padding:"11px 18px",fontSize:13,fontWeight:500,borderRadius:4,cursor:"pointer"}}>Cancel</button>
<button onClick={saveRole} disabled={!form.title.trim()||!form.function} style={{background:INK,color:"#fff",border:"none",padding:"11px 22px",fontSize:13,fontWeight:500,borderRadius:4,cursor:"pointer",opacity:!form.title.trim()||!form.function?0.5:1}}>{form.id?"Save changes":"Add role"}</button>
</div>
</div>
</div>}

<div style={{marginTop:60,paddingTop:20,borderTop:`1px solid ${RULE}`,fontSize:12,color:FAINT,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
<span>Headcount Planning · HR Toolkit for lean, scaling teams</span>
<a href="../index.html" style={{color:FAINT,textDecoration:"none"}}>Built by Trinh Sonsino</a>
</div>
</div></div>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
