<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Comp Structuring - Trinh Sonsino HR Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#fff;color:#0f0f0f;}
.back-link{font-size:13px;color:#555;text-decoration:none;padding:16px 24px;display:inline-flex;align-items:center;gap:6px;border-bottom:1px solid #e4e4e4;width:100%;}
.back-link:hover{color:#0f0f0f;}
.wrap{max-width:780px;margin:0 auto;padding:40px 24px 80px;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#9a9a9a;margin-bottom:10px;}
h1{font-family:'DM Serif Display',serif;font-size:34px;line-height:1.15;margin:0;}
.subtitle{color:#555;font-size:15px;max-width:540px;line-height:1.65;margin-top:12px;}
.divider{border:none;border-top:1px solid #e4e4e4;margin:24px 0;}
label{font-size:12px;font-weight:500;color:#555;display:block;margin-bottom:6px;}
input,select,textarea{width:100%;box-sizing:border-box;border:1px solid #e4e4e4;border-radius:6px;padding:11px 14px;font-size:14px;font-family:inherit;color:#0f0f0f;outline:none;background:#fff;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.mb16{margin-bottom:16px;}
.mb24{margin-bottom:24px;}
.btn-primary{background:#0f0f0f;color:#fff;border:none;padding:13px 28px;font-size:14px;font-weight:500;border-radius:4px;cursor:pointer;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-secondary{border:1px solid #ccc;background:#fff;color:#555;padding:9px 16px;font-size:13px;font-weight:500;border-radius:4px;cursor:pointer;}
.toggle-row{display:flex;gap:8px;flex-wrap:wrap;}
.toggle-btn{padding:10px 14px;font-size:12px;font-weight:500;border:1px solid #e4e4e4;border-radius:6px;background:#fff;cursor:pointer;color:#0f0f0f;}
.toggle-btn.active{border:2px solid #0f0f0f;}
.section-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#9a9a9a;margin-bottom:8px;}
.result-block{margin-bottom:28px;}
.result-title{font-weight:600;font-size:15px;margin-bottom:6px;}
.comp-band{display:flex;gap:0;border:1px solid #e4e4e4;border-radius:8px;overflow:hidden;margin-bottom:14px;}
.comp-cell{flex:1;padding:14px 18px;border-right:1px solid #e4e4e4;text-align:center;}
.comp-cell:last-child{border-right:none;}
.comp-num{font-family:'DM Serif Display',serif;font-size:22px;line-height:1;margin-bottom:4px;}
.comp-label{font-size:11px;color:#9a9a9a;}
.equity-card{border:1px solid #e4e4e4;border-radius:8px;padding:14px 18px;margin-bottom:8px;}
.equity-title{font-weight:600;font-size:13px;margin-bottom:4px;}
.equity-body{font-size:13px;color:#555;line-height:1.65;}
.risk-item{display:flex;gap:10px;margin-bottom:8px;font-size:14px;color:#555;line-height:1.65;}
.risk-marker{color:#a16207;flex-shrink:0;}
.pitch-box{background:#fafafa;border:1px solid #e4e4e4;border-radius:8px;padding:20px 24px;font-size:14px;color:#555;line-height:1.8;font-style:italic;}
.finance-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px 18px;}
.finance-label{font-size:11px;font-weight:600;color:#1d4ed8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.finance-body{font-size:14px;color:#1e3a6e;line-height:1.7;}
.warning-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;font-size:13px;color:#78350f;line-height:1.6;margin-bottom:24px;}
.copy-btn{border:1px solid #ccc;background:#fff;padding:7px 14px;font-size:12px;font-weight:500;border-radius:4px;cursor:pointer;}
.error{color:#b91c1c;font-size:13px;margin-top:10px;}
.footer{margin-top:60px;padding-top:20px;border-top:1px solid #e4e4e4;display:flex;justify-content:space-between;font-size:12px;color:#9a9a9a;}
</style>
</head>
<body>
<a href="../index.html" class="back-link">&larr; Back to Trinh Sonsino</a>
<div class="wrap">
  <div class="eyebrow">HR Toolkit &middot; 07</div>
  <h1>Comp Structuring</h1>
  <p class="subtitle">Build a comp philosophy your team can stand behind, then structure a specific offer with internal equity analysis and a budget ask for finance.</p>
  <hr class="divider"/>

  <div id="form-section">
    <div class="grid2">
      <div class="mb16"><label>Role title</label><input id="role" placeholder="e.g., Senior Product Designer"/></div>
      <div class="mb16"><label>Level</label><input id="level" placeholder="e.g., IC4, Senior, L5"/></div>
    </div>
    <div class="grid2">
      <div class="mb16"><label>Location / market</label><input id="location" placeholder="e.g., San Francisco, Remote US"/></div>
      <div class="mb16"><label>Company stage</label>
        <select id="stage">
          <option>Seed / Series A</option>
          <option selected>Series B / C</option>
          <option>Late stage / Pre-IPO</option>
          <option>Public</option>
        </select>
      </div>
    </div>
    <div class="mb16">
      <label>Market target</label>
      <div class="toggle-row" id="market-toggle">
        <button class="toggle-btn" onclick="setToggle('market','25th',this)">25th (lean)</button>
        <button class="toggle-btn active" onclick="setToggle('market','50th',this)">50th (market)</button>
        <button class="toggle-btn" onclick="setToggle('market','75th',this)">75th (competitive)</button>
        <button class="toggle-btn" onclick="setToggle('market','90th',this)">90th (top of market)</button>
      </div>
    </div>
    <div class="mb16">
      <label>Candidate situation</label>
      <div class="toggle-row" id="candidate-toggle">
        <button class="toggle-btn active" onclick="setToggle('candidate','new_hire',this)">New hire</button>
        <button class="toggle-btn" onclick="setToggle('candidate','internal_promo',this)">Internal promo</button>
        <button class="toggle-btn" onclick="setToggle('candidate','retention',this)">Retention risk</button>
        <button class="toggle-btn" onclick="setToggle('candidate','counter',this)">Counter offer</button>
      </div>
    </div>
    <div class="grid2">
      <div class="mb16"><label>Candidate current / expected base ($k)</label><input id="candidate-base" placeholder="e.g., 175" type="number"/></div>
      <div class="mb16"><label>Internal team base range ($k)</label><input id="team-range" placeholder="e.g., 160-210"/></div>
    </div>
    <div class="mb24">
      <label>Anything else relevant? (optional)</label>
      <textarea id="notes" rows="2" placeholder="e.g., Competing offer at $220k, strong performer, first eng hire in this region"></textarea>
    </div>
    <button class="btn-primary" id="build-btn" onclick="buildOffer()" disabled>Structure the offer</button>
    <div id="error-msg" class="error"></div>
  </div>

  <div id="output-section" style="display:none;"></div>

  <div class="footer">
    <span>Comp Structuring &middot; HR Toolkit for lean, scaling teams</span>
    <span>Built by Trinh Sonsino</span>
  </div>
</div>

<script>
var selected = {market: '50th', candidate: 'new_hire'};

function setToggle(group, val, btn) {
  selected[group] = val;
  var container = document.getElementById(group + '-toggle');
  container.querySelectorAll('.toggle-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

// Enable button when role is filled
document.getElementById('role').addEventListener('input', function() {
  document.getElementById('build-btn').disabled = !this.value.trim();
});

function repairJSON(text) {
  var cleaned = text.replace(/```json|```/g, '').trim();
  try { JSON.parse(cleaned); return cleaned; } catch(e) {}
  var opens = 0, openArr = 0;
  for (var i = 0; i < cleaned.length; i++) {
    if (cleaned[i] === '{') opens++;
    else if (cleaned[i] === '}') opens--;
    else if (cleaned[i] === '[') openArr++;
    else if (cleaned[i] === ']') openArr--;
  }
  if (cleaned.match(/"[^"]*$/)) cleaned += '"';
  while (openArr > 0) { cleaned += ']'; openArr--; }
  while (opens > 0) { cleaned += '}'; opens--; }
  return cleaned;
}

async function buildOffer() {
  var btn = document.getElementById('build-btn');
  btn.disabled = true;
  btn.textContent = 'Structuring the offer...';
  document.getElementById('error-msg').textContent = '';

  var candidateLabels = {new_hire:'New hire', internal_promo:'Internal promotion', retention:'Retention risk', counter:'Counter offer'};

  var prompt = 'You are an experienced compensation expert at a startup. Structure a specific offer and flag equity risks.\n\n' +
    'Role: ' + document.getElementById('role').value + '\n' +
    'Level: ' + (document.getElementById('level').value || 'not specified') + '\n' +
    'Location: ' + (document.getElementById('location').value || 'not specified') + '\n' +
    'Company stage: ' + document.getElementById('stage').value + '\n' +
    'Market target: ' + selected.market + ' percentile\n' +
    'Situation: ' + candidateLabels[selected.candidate] + '\n' +
    'Candidate current/expected base: $' + (document.getElementById('candidate-base').value || '?') + 'k\n' +
    'Internal team base range: ' + (document.getElementById('team-range').value || 'not provided') + '\n' +
    'Notes: ' + (document.getElementById('notes').value || 'none') + '\n\n' +
    'Return ONLY valid JSON. Keep all text SHORT - 1-2 sentences max:\n' +
    '{"base_band":{"low":0,"mid":0,"high":0,"recommendation":0,"rationale":"1 sentence"},' +
    '"equity_analysis":{"internal_equity":"1-2 sentences on fit within team range","risks":["1-2 specific risks if any"]},' +
    '"total_comp":{"base":0,"equity_note":"1 sentence on equity package","bonus_note":"1 sentence or null"},' +
    '"candidate_pitch":"2-3 sentences positioning the offer",' +
    '"finance_ask":"2-3 sentences - business case for finance approval",' +
    '"watch_for":["1-2 things to monitor after offer"]}\n\n' +
    'All dollar values in thousands. Be specific. Total response under 600 tokens.';

  try {
    var response = await fetch('https://tsonsino-backend.vercel.app/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: prompt, maxTokens: 2000})
    });
    var data = await response.json();
    if (!data.text) throw new Error(data.error || 'No response'); if (data.error && data.error.includes('high demand')) throw new Error(data.error);
    var result = JSON.parse(repairJSON(data.text));
    renderOutput(result);
  } catch(e) {
    document.getElementById('error-msg').textContent = e.message && e.message.includes('high demand') ? 'Gemini is experiencing high demand right now. Wait a few seconds and try again.' : 'Something went wrong. Try again.';
    console.error(e);
    btn.disabled = false;
    btn.textContent = 'Structure the offer';
  }
}

function renderOutput(r) {
  var html = '';

  // Base band
  var b = r.base_band;
  if (b) {
    html += '<div class="result-block"><div class="section-label">Base salary band</div>';
    html += '<div class="comp-band">';
    html += '<div class="comp-cell"><div class="comp-num">$'+b.low+'k</div><div class="comp-label">Low</div></div>';
    html += '<div class="comp-cell" style="background:#fafafa;"><div class="comp-num">$'+b.mid+'k</div><div class="comp-label">Mid</div></div>';
    html += '<div class="comp-cell"><div class="comp-num">$'+b.high+'k</div><div class="comp-label">High</div></div>';
    if (b.recommendation) html += '<div class="comp-cell" style="background:#0f0f0f;"><div class="comp-num" style="color:#fff;">$'+b.recommendation+'k</div><div class="comp-label" style="color:#9a9a9a;">Recommended</div></div>';
    html += '</div>';
    if (b.rationale) html += '<p style="font-size:13px;color:#555;line-height:1.65;">'+b.rationale+'</p>';
    html += '</div>';
  }

  // Equity analysis
  var eq = r.equity_analysis;
  if (eq) {
    html += '<div class="result-block"><div class="section-label">Internal equity check</div>';
    if (eq.internal_equity) html += '<p style="font-size:14px;color:#555;line-height:1.7;margin-bottom:10px;">'+eq.internal_equity+'</p>';
    if (eq.risks && eq.risks.length) {
      eq.risks.forEach(function(risk) {
        html += '<div class="risk-item"><span class="risk-marker">-</span><span>'+risk+'</span></div>';
      });
    }
    html += '</div>';
  }

  // Total comp
  var tc = r.total_comp;
  if (tc) {
    html += '<div class="result-block"><div class="section-label">Total comp picture</div>';
    if (tc.base) html += '<p style="font-size:14px;color:#555;margin-bottom:8px;">Base: <strong>$'+tc.base+'k</strong></p>';
    if (tc.equity_note) html += '<p style="font-size:13px;color:#555;line-height:1.65;margin-bottom:6px;">'+tc.equity_note+'</p>';
    if (tc.bonus_note) html += '<p style="font-size:13px;color:#555;line-height:1.65;">'+tc.bonus_note+'</p>';
    html += '</div>';
  }

  // Candidate pitch
  if (r.candidate_pitch) {
    html += '<div class="result-block">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
    html += '<div class="section-label" style="margin:0;">How to pitch this offer</div>';
    html += '<button class="copy-btn" onclick="copyText(\''+encodeURIComponent(r.candidate_pitch)+'\')">Copy</button></div>';
    html += '<div class="pitch-box">"'+r.candidate_pitch+'"</div>';
    html += '</div>';
  }

  // Finance ask
  if (r.finance_ask) {
    html += '<div class="result-block"><div class="finance-box">';
    html += '<div class="finance-label">Finance approval ask</div>';
    html += '<div class="finance-body">'+r.finance_ask+'</div>';
    html += '</div></div>';
  }

  // Watch for
  if (r.watch_for && r.watch_for.length) {
    html += '<div class="result-block"><div class="section-label">Watch for after offer</div>';
    r.watch_for.forEach(function(w) {
      html += '<div class="risk-item"><span class="risk-marker">-</span><span>'+w+'</span></div>';
    });
    html += '</div>';
  }

  html += '<div class="warning-box">Comp data varies by source and changes quarterly. Always validate against current market data before finalizing.</div>';
  html += '<button class="btn-secondary" onclick="reset()">Start over</button>';

  var out = document.getElementById('output-section');
  out.innerHTML = html;
  out.style.display = 'block';
  document.getElementById('form-section').style.display = 'none';
}

function copyText(encoded) {
  var text = decodeURIComponent(encoded);
  var el = document.createElement('textarea');
  el.value = text;
  document.body.appendChild(el);
  el.select();
  document.execCommand('copy');
  document.body.removeChild(el);
}

function reset() {
  document.getElementById('output-section').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('build-btn').disabled = false;
  document.getElementById('build-btn').textContent = 'Structure the offer';
}
</script>
</body>
</html>
